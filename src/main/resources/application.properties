spring.application.name=skillbridge

# ?? Server ??????????????????????????????????????????????????????
server.port=8080

# ?? Database (Docker on port 3307) ??????????????????????????????
spring.datasource.url=jdbc:mysql://localhost:3307/skillbridge_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=sbuser
spring.datasource.password=sbpassword
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ?? JPA / Hibernate ??????????????????????????????????????????????
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ?? Email (Mailtrap) ?????????????????????????????????????????????
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ?? OAuth2 scopes ????????????????????????????????????????????????
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.github.scope=read:user,user:email

# ?? File Upload ??????????????????????????????????????????????????
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ?? Load secrets from separate file ?????????????????????????????
spring.config.import=optional:classpath:application-secrets.properties