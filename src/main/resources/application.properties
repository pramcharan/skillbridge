spring.application.name=skillbridge

# Server
server.port=8080

# Database (Docker on port 3307)
spring.datasource.url=jdbc:mysql://localhost:3307/skillbridge_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=sbuser
spring.datasource.password=sbpassword
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

# Email (Mailtrap)
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# OAuth2 scopes
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.github.scope=read:user,user:email

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Load secrets from separate file
spring.config.import=optional:classpath:application-secrets.properties

# Suppress favicon.ico 404 noise in console
spring.mvc.favicon.enabled=false
logging.level.org.springframework.web.servlet.resource=OFF

# AI Provider Config
app.ai.provider=ollama

# Ollama
app.ai.ollama.base-url=http://localhost:11434
app.ai.ollama.model=mistral:7b-instruct
app.ai.ollama.timeout-seconds=60

# OpenAI (fill in when going to production)
app.ai.openai.base-url=https://api.openai.com/v1
app.ai.openai.model=gpt-4o-mini


spring.data.web.pageable.serialize-page-content-as-list=true

app.upload.dir=uploads
app.upload.max-size-mb=5


# Connection pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA performance
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.fetch_size=50

# Disable open-session-in-view (prevents lazy loading outside transactions)
spring.jpa.open-in-view=false

# Logging ? disable in production
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=OFF

# Cache static assets
spring.web.resources.cache.period=86400
spring.web.resources.chain.enabled=true

# Compression
server.compression.enabled=true
server.compression.mime-types=application/json,application/javascript,text/css,text/html
server.compression.min-response-size=1024
