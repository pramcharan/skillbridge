<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%2300C9A7'/%3E%3Cstop offset='100%25' stop-color='%23F5A623'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='8' fill='url(%23g)'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-family='Arial Black,sans-serif' font-weight='900' font-size='14' fill='white'%3ESB%3C/text%3E%3C/svg%3E">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications — SkillBridge</title>
    <meta name="description" content="SkillBridge connects top Indian freelancers with clients. AI-powered proposal scoring, real-time chat, and verified reviews.">
    <meta name="theme-color" content="#00C9A7">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
        :root {
          --bg:#060D1A; --bg2:#0B1425; --card:#0D1829; --card2:#111f38;
          --teal:#00C9A7; --teal-dk:#00A389; --gold:#F5A623; --purple:#7B61FF;
          --rose:#FF6B8A; --text:#E8F0FE; --text2:#8BA3C7; --text3:#5A7090;
          --border:#1A2D4A; --border2:#243650;
        }
        body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
        nav {
          display:flex; align-items:center; justify-content:space-between;
          padding:0 5%; height:64px; background:rgba(6,13,26,0.95);
          border-bottom:1px solid var(--border); position:sticky; top:0; z-index:50;
        }
        .nav-logo { font-family:'Syne',sans-serif; font-weight:800; font-size:1.35rem;
          background:linear-gradient(135deg,var(--teal),var(--gold));
          -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .nav-links a { font-size:0.88rem; color:var(--text2); text-decoration:none; transition:color 0.2s; }
        .nav-links a:hover { color:var(--teal); }
        .btn-sm { padding:0.4rem 1rem; border-radius:8px; font-size:0.85rem; font-weight:600; cursor:pointer; font-family:'DM Sans',sans-serif; }
        .btn-logout { background:transparent; border:1px solid var(--border2); color:var(--text2); transition:all 0.2s; }
        .btn-logout:hover { border-color:var(--rose); color:var(--rose); }

        main { max-width:680px; margin:0 auto; padding:2rem 5%; }
        .page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.75rem; }
        .page-header h1 { font-family:'Syne',sans-serif; font-weight:800; font-size:1.6rem; }
        .btn-mark-all {
          padding:0.5rem 1.25rem; border-radius:10px; font-size:0.82rem; font-weight:600;
          cursor:pointer; font-family:'DM Sans',sans-serif;
          background:transparent; border:1px solid var(--border2); color:var(--text2); transition:all 0.2s;
        }
        .btn-mark-all:hover { border-color:var(--teal); color:var(--teal); }

        .notif-item {
          background:var(--card); border:1px solid var(--border2); border-radius:14px;
          padding:1rem 1.25rem; margin-bottom:0.6rem;
          display:flex; align-items:flex-start; gap:1rem;
          transition:border-color 0.2s, opacity 0.2s;
          position:relative;
        }
        .notif-item.unread { border-color:rgba(0,201,167,0.25); background:rgba(0,201,167,0.03); }
        .notif-item:hover { border-color:var(--teal); }
        .notif-icon {
          width:40px; height:40px; border-radius:12px; flex-shrink:0;
          display:flex; align-items:center; justify-content:center; font-size:1.1rem;
        }
        .icon-message    { background:rgba(123,97,255,0.15); }
        .icon-proposal   { background:rgba(0,201,167,0.12); }
        .icon-project    { background:rgba(245,166,35,0.12); }
        .icon-system     { background:rgba(255,107,138,0.12); }
        .notif-body { flex:1; min-width:0; }
        .notif-title { font-weight:600; font-size:0.9rem; margin-bottom:0.2rem; }
        .notif-text  { font-size:0.83rem; color:var(--text2); line-height:1.4; }
        .notif-time  { font-size:0.75rem; color:var(--text3); margin-top:0.35rem; }
        .notif-actions { display:flex; gap:0.5rem; flex-shrink:0; }
        .btn-notif {
          width:28px; height:28px; border-radius:8px; border:none; cursor:pointer;
          background:var(--bg2); color:var(--text3); font-size:0.8rem;
          display:flex; align-items:center; justify-content:center; transition:all 0.2s;
        }
        .empty-icon { width:52px; height:52px; margin:0 auto 1rem; opacity:0.3; display:block; }
        .btn-notif:hover { color:var(--rose); }
        .unread-dot {
          width:8px; height:8px; border-radius:50%; background:var(--teal);
          position:absolute; top:1rem; right:1rem;
        }
        .empty-state { text-align:center; padding:4rem; color:var(--text3); }
        .empty-icon { font-size:2.5rem; margin-bottom:0.75rem; }
        .notif-link { text-decoration:none; color:inherit; display:block; cursor:pointer; }
        .notif-link:hover .notif-title { color:var(--teal); }

        /* Skeleton */
.skeleton {
    background: linear-gradient(90deg, var(--card) 25%, var(--card2) 50%, var(--card) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 14px;
    height: 72px;
    margin-bottom: 0.6rem;
    border: 1px solid var(--border2);
}
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* Notification item entrance */
.notif-item {
    animation: slideUp 0.25s ease both;
}
.notif-item:nth-child(1) { animation-delay: 0.03s; }
.notif-item:nth-child(2) { animation-delay: 0.06s; }
.notif-item:nth-child(3) { animation-delay: 0.09s; }
.notif-item:nth-child(4) { animation-delay: 0.12s; }
.notif-item:nth-child(5) { animation-delay: 0.15s; }
@keyframes slideUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: none; }
}

/* Unread dot pulse */
.unread-dot {
    animation: dot-pulse 2s ease-in-out infinite;
}
@keyframes dot-pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.5; transform: scale(1.3); }
}

/* Unread item left border */
.notif-item.unread {
    border-left: 3px solid var(--teal);
}

/* Icon colors per type */
.icon-message  { color: var(--purple); }
.icon-proposal { color: var(--teal);   }
.icon-project  { color: var(--gold);   }
.icon-system   { color: var(--rose);   }

/* Delete button hover — rose */
.btn-notif:hover { background: rgba(255,107,138,0.08); color: var(--rose); }

/* Mark read hover — teal */
.btn-notif.btn-read:hover { background: rgba(0,201,167,0.08); color: var(--teal); }

/* Page header gradient title */
.page-header h1 {
    background: linear-gradient(135deg, var(--text), var(--text2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.02em;
}

/* Mark all button — teal on hover glow */
.btn-mark-all:hover {
    box-shadow: 0 0 12px rgba(0,201,167,0.1);
}

/* Notification title on hover */
.notif-link:hover .notif-title {
    color: var(--teal);
    transition: color 0.2s;
}
    </style>
</head>
<body>
<nav>
    <a href="/" class="nav-logo">SkillBridge</a>
    <div class="nav-links">
        <a href="#" id="dashboard-link"> Dashboard</a>
        <a href="/community.html">Community</a>
    </div>
    <div style="display:flex;align-items:center;gap:0.75rem;">
        <button class="btn-sm btn-logout" onclick="logout()">Logout</button>
    </div>
</nav>

<main>
    <div class="page-header">
        <h1>Notifications</h1>
        <button class="btn-mark-all" onclick="markAllRead()">Mark all as read</button>
    </div>
    <div id="notif-list"></div>
</main>

<script src="/js/utils.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/api.js"></script>

<script>
    requireAuth();

    const TYPE_ICON = {
    NEW_MESSAGE:       { svg:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>', cls:'icon-message' },
    NEW_PROPOSAL:      { svg:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>', cls:'icon-proposal' },
    PROPOSAL_ACCEPTED: { svg:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>', cls:'icon-proposal' },
    PROPOSAL_REJECTED: { svg:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>', cls:'icon-proposal' },
    PROJECT_UPDATE:    { svg:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>', cls:'icon-project' },
    SYSTEM:            { svg:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>', cls:'icon-system' },
};

    let notifications = [];

    async function loadNotifications() {
        document.getElementById('notif-list').innerHTML =
        '<div class="skeleton"></div>'.repeat(5);
        try {
            const [profileRes, notifRes] = await Promise.all([
                api.get('/api/v1/profile'),
                api.get('/api/v1/notifications?page=0&size=50')
            ]);

            const profile = await profileRes.json();
            const data    = await notifRes.json();
            notifications = data.content || [];

            const role = profile.role || localStorage.getItem('sb_role');
            document.getElementById('dashboard-link').href =
                role === 'CLIENT' ? '/dashboard-client.html' : '/dashboard-freelancer.html';

            render();
        } catch(e) {
            console.error(e);
            document.getElementById('notif-list').innerHTML =
                `<div class="empty-state">
    <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    <p>Failed to load notifications.</p>
</div>`;
        }
    }

    function render() {
        const list = document.getElementById('notif-list');
        if (notifications.length === 0) {
            list.innerHTML = `
                <div class="empty-state">
    <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
        <polyline points="22 4 12 14.01 9 11.01"/>
    </svg>
    <p style="font-size:1rem;font-weight:600;color:var(--text2);">You're all caught up!</p>
    <p style="font-size:0.85rem;margin-top:0.5rem;">No notifications yet.</p>
</div>`;
            return;
        }

        list.innerHTML = notifications.map(n => {
            const meta    = TYPE_ICON[n.type] || TYPE_ICON.SYSTEM;
            const unread  = !n.isRead;
            const timeStr = formatDate(n.createdAt);

            return `
            <div class="notif-item${unread ? ' unread':''}" id="notif-${n.id}">
                ${n.link
                    ? `<a class="notif-link" href="${escHtml(n.link)}"
                          onclick="markRead(${n.id})"
                          style="display:flex;gap:1rem;align-items:flex-start;flex:1;text-decoration:none;color:inherit;">`
                    : `<div style="display:flex;gap:1rem;align-items:flex-start;flex:1;">`}
                    <div class="notif-icon ${meta.cls}">${meta.svg}</div>
                    <div class="notif-body">
                        <div class="notif-title">${escHtml(n.title||'Notification')}</div>
                        <div class="notif-text">${escHtml(n.message||'')}</div>
                        <div class="notif-time">${timeStr}</div>
                    </div>
                ${n.link ? '</a>' : '</div>'}
                <div class="notif-actions">
                    ${unread
                        ? `<button class="btn-notif btn-read" onclick="markRead(${n.id})" title="Mark as read">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="20 6 9 17 4 12"/>
    </svg>
</button>`
                        : ''}
                    <button class="btn-notif" onclick="deleteNotif(${n.id})" title="Delete">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
        <path d="M10 11v6M14 11v6"/>
    </svg>
</button>
                </div>
                ${unread ? '<div class="unread-dot"></div>' : ''}
            </div>`;
        }).join('');
    }

    async function markRead(id) {
        try {
            await api.patch(`/api/v1/notifications/${id}/read`);
            const notif = notifications.find(n => n.id === id);
            if (notif) notif.isRead = true;
            render();
        } catch(e) { console.error(e); }
    }

    async function markAllRead() {
        try {
            await api.patch('/api/v1/notifications/read-all');
            notifications.forEach(n => n.isRead = true);
            render();
        } catch(e) { console.error(e); }
    }

    async function deleteNotif(id) {
        const el = document.getElementById('notif-' + id);
        if (el) { el.style.opacity = '0.3'; }
        try {
            await api.delete(`/api/v1/notifications/${id}`);
            notifications = notifications.filter(n => n.id !== id);
            render();
        } catch(e) {
            if (el) el.style.opacity = '1';
        }
    }

    loadNotifications();
</script>
</body>
</html>
