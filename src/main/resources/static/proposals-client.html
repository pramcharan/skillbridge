<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%2300C9A7'/%3E%3Cstop offset='100%25' stop-color='%23F5A623'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='8' fill='url(%23g)'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-family='Arial Black,sans-serif' font-weight='900' font-size='14' fill='white'%3ESB%3C/text%3E%3C/svg%3E">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proposals — SkillBridge</title>
    <meta name="description" content="SkillBridge connects top Indian freelancers with clients. AI-powered proposal scoring, real-time chat, and verified reviews.">
    <meta name="theme-color" content="#00C9A7">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="/js/theme.js"></script>
    <style>
        *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
        :root {
          --bg:#060D1A; --bg2:#0B1425; --card:#0D1829; --card2:#111f38;
          --teal:#00C9A7; --teal-dk:#00A389; --gold:#F5A623; --purple:#7B61FF;
          --rose:#FF6B8A; --text:#E8F0FE; --text2:#8BA3C7; --text3:#5A7090;
          --border:#1A2D4A; --border2:#243650;
        }
        [data-theme="light"] {
          --bg:#F8FAFC; --bg2:#F1F5F9; --card:#FFFFFF; --card2:#F8FAFC;
          --text:#0F172A; --text2:#475569; --text3:#64748B;
          --border:#E2E8F0; --border2:#CBD5E1;
        }
        body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
        nav {
          display:flex; align-items:center; justify-content:space-between;
          padding:0 5%; height:64px; background:var(--bg);
          border-bottom:1px solid var(--border); position:sticky; top:0; z-index:50;
        }
        .nav-logo { font-family:'Syne',sans-serif; font-weight:800; font-size:1.35rem;
          background:linear-gradient(135deg,var(--teal),var(--gold));
          -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
        .nav-links { display:flex; gap:1.5rem; align-items:center; }
        .nav-links a { font-size:0.88rem; color:var(--text2); text-decoration:none; transition:color 0.2s; }
        .nav-links a:hover { color:var(--teal); }
        .user-av {
          width:36px; height:36px; border-radius:50%;
          background:linear-gradient(135deg,var(--gold),var(--rose));
          display:flex; align-items:center; justify-content:center;
          font-weight:700; font-size:0.85rem; color:#fff;
        }
        .btn-sm { padding:0.4rem 1rem; border-radius:8px; font-size:0.85rem; font-weight:600; cursor:pointer; font-family:'DM Sans',sans-serif; }
        .btn-logout { background:transparent; border:1px solid var(--border2); color:var(--text2); transition:all 0.2s; }
        .btn-logout:hover { border-color:var(--rose); color:var(--rose); }
        main { max-width:900px; margin:0 auto; padding:2rem 5%; }
        .page-header { margin-bottom:2rem; }
        .page-header h1 { font-family:'Syne',sans-serif; font-weight:800; font-size:1.6rem; margin-bottom:0.35rem; }
        .page-header p { color:var(--text2); font-size:0.9rem; }
        .back-link { display:inline-flex; align-items:center; gap:0.4rem; color:var(--text2);
          text-decoration:none; font-size:0.85rem; margin-bottom:1.25rem; transition:color 0.2s; }
        .back-link:hover { color:var(--teal); }
        .proposal-card {
          background:var(--card); border:1px solid var(--border2); border-radius:16px;
          padding:1.5rem; margin-bottom:1rem; transition:border-color 0.2s;
        }
        .proposal-card:hover { border-color:var(--teal); }
        .pc-top { display:flex; align-items:flex-start; justify-content:space-between; gap:1rem; margin-bottom:1rem; }
        .pc-left { display:flex; align-items:center; gap:0.85rem; }
        .pc-avatar {
          width:44px; height:44px; border-radius:50%;
          background:linear-gradient(135deg,var(--purple),var(--teal));
          display:flex; align-items:center; justify-content:center;
          font-weight:700; font-size:1rem; color:#fff; flex-shrink:0;
        }
        .pc-name { font-weight:700; font-size:1rem; }
        .pc-meta { font-size:0.8rem; color:var(--text2); margin-top:0.2rem; }
        .pc-right { display:flex; flex-direction:column; align-items:flex-end; gap:0.4rem; }
        .ai-badge {
          padding:0.25rem 0.75rem; border-radius:99px; font-size:0.75rem; font-weight:700;
        }
        .badge-green { background:rgba(0,201,167,0.12); color:var(--teal); border:1px solid rgba(0,201,167,0.25); }
        .badge-amber { background:rgba(245,166,35,0.12); color:var(--gold); border:1px solid rgba(245,166,35,0.25); }
        .badge-red   { background:rgba(255,107,138,0.12); color:var(--rose); border:1px solid rgba(255,107,138,0.25); }
        .pc-rate { font-family:'Syne',sans-serif; font-weight:800; font-size:1.1rem; color:var(--gold); }
        .pc-cover {
          font-size:0.88rem; color:var(--text2); line-height:1.6;
          background:var(--bg2); border-radius:10px; padding:1rem;
          margin-bottom:1rem; border:1px solid var(--border);
        }
        .pc-ai-reason {
          font-size:0.82rem; color:var(--text3); line-height:1.5;
          padding:0.75rem 1rem; border-left:3px solid var(--teal);
          margin-bottom:1rem; background:rgba(0,201,167,0.03); border-radius:0 8px 8px 0;
        }
        .pc-skills { display:flex; flex-wrap:wrap; gap:0.4rem; margin-bottom:1rem; }
        .skill-tag {
          padding:0.2rem 0.6rem; border-radius:99px; font-size:0.75rem;
          background:rgba(123,97,255,0.1); color:var(--purple); border:1px solid rgba(123,97,255,0.2);
        }
        .pc-actions { display:flex; gap:0.75rem; }
        .btn-accept {
          padding:0.5rem 1.25rem; border-radius:10px; font-size:0.85rem; font-weight:700;
          cursor:pointer; font-family:'DM Sans',sans-serif;
          background:linear-gradient(135deg,var(--teal),var(--teal-dk)); border:none; color:#000;
          transition:opacity 0.2s;
        }

        .empty-icon-svg {
    width: 52px; height: 52px;
    margin: 0 auto 0.75rem; display: block; opacity: 0.25;
}

        .btn-accept:hover { opacity:0.85; }
        .btn-reject {
          padding:0.5rem 1.25rem; border-radius:10px; font-size:0.85rem; font-weight:700;
          cursor:pointer; font-family:'DM Sans',sans-serif;
          background:transparent; border:1px solid var(--rose); color:var(--rose);
          transition:all 0.2s;
        }
        .btn-reject:hover { background:rgba(255,107,138,0.1); }
        .status-badge {
          padding:0.3rem 0.85rem; border-radius:99px; font-size:0.8rem; font-weight:700;
        }
        .status-accepted { background:rgba(0,201,167,0.1); color:var(--teal); border:1px solid rgba(0,201,167,0.2); }
        .status-rejected { background:rgba(255,107,138,0.1); color:var(--rose); border:1px solid rgba(255,107,138,0.2); }
        .status-pending  { background:rgba(245,166,35,0.1); color:var(--gold); border:1px solid rgba(245,166,35,0.2); }
        .status-withdrawn{ background:rgba(74,96,128,0.1); color:var(--text3); border:1px solid var(--border2); }
        .empty-state { text-align:center; padding:4rem; color:var(--text3); }
        .empty-icon { font-size:2.5rem; margin-bottom:0.75rem; }
        .loading { text-align:center; padding:3rem; color:var(--text3); }
        .job-info-bar {
          background:var(--card2); border:1px solid var(--border2); border-radius:12px;
          padding:1rem 1.25rem; margin-bottom:1.5rem;
          display:flex; align-items:center; justify-content:space-between;
        }
        .job-info-bar .jib-title { font-weight:700; font-size:1rem; }
        .job-info-bar .jib-meta { font-size:0.8rem; color:var(--text2); margin-top:0.2rem; }
        .sort-bar { display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem; }
        .sort-bar h2 { font-family:'Syne',sans-serif; font-weight:700; font-size:1rem; }
        .sort-bar span { font-size:0.82rem; color:var(--text3); }
        .toast {
          position:fixed; bottom:1.5rem; right:1.5rem; z-index:999;
          background:var(--card2); border:1px solid var(--teal); border-radius:12px;
          padding:0.85rem 1.25rem; font-size:0.88rem; color:var(--teal); font-weight:600;
          display:none; animation:slideUp 0.3s ease;
        }
        @keyframes slideUp { from { transform:translateY(20px); opacity:0; } to { transform:translateY(0); opacity:1; } }

        .back-link::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    border-left: 2px solid currentColor;
    border-bottom: 2px solid currentColor;
    transform: rotate(45deg) translateY(-1px);
}
        /* Page header gradient title */
.page-header h1 {
    background: linear-gradient(135deg, var(--text), var(--text2));
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.02em;
}

/* Proposal card entrance */
.proposal-card {
    animation: cardIn 0.3s ease both;
    border-left: 3px solid transparent;
    transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
}
.proposal-card:nth-child(1) { animation-delay: 0.03s; }
.proposal-card:nth-child(2) { animation-delay: 0.06s; }
.proposal-card:nth-child(3) { animation-delay: 0.09s; }
.proposal-card:nth-child(4) { animation-delay: 0.12s; }
.proposal-card:nth-child(5) { animation-delay: 0.15s; }
@keyframes cardIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: none; }
}
.proposal-card:hover {
    border-left-color: var(--teal);
    box-shadow: 0 4px 24px rgba(0,0,0,0.2);
}

/* Avatar gradient per initial */
.pc-avatar {
    box-shadow: 0 2px 8px rgba(123,97,255,0.25);
}

/* Rate number glow */
.pc-rate {
    text-shadow: 0 0 20px rgba(245,166,35,0.3);
}

/* Accept button glow */
@keyframes glow-pulse {
    0%,100% { box-shadow: 0 4px 16px rgba(0,201,167,0.3); }
    50%      { box-shadow: 0 4px 24px rgba(0,201,167,0.5); }
}
.btn-accept {
    animation: glow-pulse 2.5s ease-in-out infinite;
}

/* Cover letter subtle left border */
.pc-cover {
    border-left: 3px solid var(--border2);
    transition: border-color 0.2s;
}
.proposal-card:hover .pc-cover {
    border-left-color: rgba(0,201,167,0.3);
}

/* AI reason shimmer border */
.pc-ai-reason {
    position: relative;
    overflow: hidden;
}
.pc-ai-reason::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: linear-gradient(180deg, var(--teal), var(--purple));
    border-radius: 99px;
}

/* Badge green pulse */
.badge-green {
    animation: badge-pulse 3s ease-in-out infinite;
}
@keyframes badge-pulse {
    0%,100% { box-shadow: none; }
    50%      { box-shadow: 0 0 8px rgba(0,201,167,0.2); }
}

/* Skill tag hover */
.skill-tag {
    transition: background 0.15s, color 0.15s;
}
.skill-tag:hover {
    background: rgba(123,97,255,0.2);
    color: #a08fff;
}

/* Job info bar */
.job-info-bar {
    border-top: 2px solid rgba(0,201,167,0.15);
}

/* Sort bar count */
.sort-bar span {
    background: var(--card2);
    padding: 0.2rem 0.6rem;
    border-radius: 99px;
    border: 1px solid var(--border2);
}

/* NEW badge pulse */
@keyframes new-pulse {
    0%,100% { opacity: 1; }
    50%      { opacity: 0.5; }
}

        /* ── Full Proposal Modal ── */
        .modal-overlay {
            position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:1000;
            display:flex; align-items:center; justify-content:center; padding:1rem;
            backdrop-filter:blur(4px);
        }
        .modal-box {
            background:var(--card); border:1px solid var(--border2); border-radius:20px;
            padding:2rem; width:100%; max-width:600px; max-height:85vh; overflow-y:auto;
        }
        .modal-header {
            display:flex; align-items:center; justify-content:space-between;
            margin-bottom:1.5rem;
        }
        .modal-header h3 { font-family:'Syne',sans-serif; font-weight:700; font-size:1.1rem; }
        .modal-close {
            width:30px; height:30px; border-radius:8px; border:1px solid var(--border2);
            background:transparent; color:var(--text2); cursor:pointer; font-size:1.1rem;
            display:flex; align-items:center; justify-content:center; transition:all 0.2s;
        }
        .modal-close:hover { border-color:var(--rose); color:var(--rose); }
        .modal-section { margin-bottom:1.25rem; }
        .modal-label {
            font-size:0.75rem; font-weight:700; color:var(--teal); text-transform:uppercase;
            letter-spacing:0.08em; margin-bottom:0.5rem;
        }
        .modal-value {
            font-size:0.9rem; color:var(--text2); line-height:1.7;
            background:var(--bg2); border-radius:10px; padding:1rem;
            border:1px solid var(--border); white-space:pre-wrap;
        }
        .modal-loading { text-align:center; padding:2rem; color:var(--text3); }
    </style>
</head>
<body>
<nav>
    <a href="/" class="nav-logo">SkillBridge</a>
    <div class="nav-links">
        <a href="/dashboard-client.html">Dashboard</a>
        <a href="/community.html">Community</a>
        <a href="/post-job.html">Post a Job</a>
    </div>
    <div style="display:flex;align-items:center;gap:0.75rem;">
        <button class="notif-btn" id="theme-toggle" onclick="toggleTheme()" aria-label="Toggle Theme" style="width:32px; height:32px; padding:6px; display:flex; align-items:center; justify-content:center; border:1px solid var(--border2); border-radius:8px; background:transparent; cursor:pointer; color:var(--text2);">
            <span class="theme-toggle-icon"></span>
        </button>
        <div class="user-av" id="user-av"
             onclick="window.location.href='/profile.html'"
             title="View Profile"
             style="cursor:pointer;">?</div>
        <button class="btn-sm btn-logout" onclick="logout()">Logout</button>
    </div>
</nav>

<main>
    <a href="/dashboard-client.html" class="back-link">Back to Dashboard</a>

    <div class="page-header">
        <h1>Proposals <span id="proposal-count" style="color:var(--text3);font-size:1.1rem;"></span></h1>
        <p id="job-subtitle" style="color:var(--text2);">Loading job details...</p>
    </div>

    <div id="proposals-container">
        <div class="loading">Loading proposals...</div>
    </div>
</main>

<!-- Full Proposal Modal -->
<div class="modal-overlay" id="proposal-modal" style="display:none;"
     onclick="if(event.target===this)closeProposalModal()">
    <div class="modal-box">
        <div class="modal-header">
            <h3>Full Proposal</h3>
            <button class="modal-close" aria-label="Close" onclick="closeProposalModal()">×</button>
        </div>
        <div id="modal-body">
            <div class="modal-loading">Loading proposal…</div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script src="/js/utils.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script>
    requireAuth('CLIENT');

    const jobId = new URLSearchParams(window.location.search).get('jobId');

    if (!jobId) {
        window.location.replace('/dashboard-client.html');
    }

    async function loadProposals() {
        try {
            // Load profile + proposals in parallel
            const [profileRes, proposalsRes] = await Promise.all([
                api.get('/api/v1/profile'),
                api.get(`/api/v1/proposals/job/${jobId}`)
            ]);

            const profile   = await profileRes.json();
            const proposals = await proposalsRes.json();

            // Set user avatar
const av = document.getElementById('user-av');
const savedAvatar = localStorage.getItem('sb_avatar') || profile.avatarUrl;
if (savedAvatar) {
    av.innerHTML = `<img src="${savedAvatar}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;
    if (profile.avatarUrl) localStorage.setItem('sb_avatar', profile.avatarUrl);
} else {
    av.textContent = (profile.name||'?')[0].toUpperCase();
}
            // Update header
            document.getElementById('proposal-count').textContent =
                `(${proposals.length})`;

            if (proposals.length > 0) {
                document.getElementById('job-subtitle').textContent =
                    `For: ${proposals[0].jobTitle} · Sorted by AI match score`;
            } else {
                document.getElementById('job-subtitle').textContent =
                    'No proposals received yet for this job.';
            }

            renderProposals(proposals);

        } catch(e) {
            console.error('Error loading proposals:', e);
            document.getElementById('proposals-container').innerHTML = `
                <div class="empty-state">
    <svg class="empty-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    <p>Failed to load proposals. Please try again.</p>
</div>`;
        }
    }

    function renderProposals(proposals) {
        const container = document.getElementById('proposals-container');

        if (proposals.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
    <svg class="empty-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M22 12h-6l-2 3h-4l-2-3H2"/>
        <path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/>
    </svg>
    <p>No proposals yet for this job.</p>
    <p style="margin-top:0.5rem;font-size:0.85rem;">Share your job to get more applicants.</p>
</div>`;
            return;
        }

        container.innerHTML = proposals.map(p => {
            const badgeClass =
                p.aiMatchBadge === 'GREEN' ? 'badge-green' :
                p.aiMatchBadge === 'AMBER' ? 'badge-amber' : 'badge-red';

            const statusClass = 'status-' + (p.status || 'pending').toLowerCase();
            const isPending   = p.status === 'PENDING';
            const initials    = (p.freelancerName || 'F').split(' ')
                .map(w => w[0]).join('').toUpperCase().slice(0,2);

            return `
            <div class="proposal-card" id="proposal-${p.id}">
                <div class="pc-top">
                    <div class="pc-left">
                        <div class="pc-avatar">${initials}</div>
                        <div>
                            <div class="pc-name">${escHtml(p.freelancerName || 'Freelancer')}</div>
                            <div class="pc-meta">
                                ${p.freelancerRating
                                    ? `${p.freelancerRating.toFixed(1)} · `
                                    : ''}
                                Applied ${formatDate(p.createdAt)}
                                ${!p.viewedByClient ? ' · <span style="color:var(--teal);font-weight:700;">NEW</span>' : ''}
                            </div>
                        </div>
                    </div>
                    <div class="pc-right">
                        ${p.aiMatchScore != null
                            ? `<span class="ai-badge ${badgeClass}">
                                 ${p.aiMatchScore.toFixed(0)}% Match
                               </span>`
                            : ''}
                        <div class="pc-rate">$${p.expectedRate}/hr</div>
                    </div>
                </div>

                ${p.freelancerSkills && p.freelancerSkills.length > 0
                    ? `<div class="pc-skills">
                         ${p.freelancerSkills.slice(0,6).map(s =>
                             `<span class="skill-tag">${escHtml(s)}</span>`).join('')}
                       </div>`
                    : ''}

                <div class="pc-cover">${escHtml(p.coverLetter)}</div>

                ${p.attachmentUrl
                ? `<a href="${p.attachmentUrl}" target="_blank" style="display:inline-flex;align-items:center;gap:0.4rem;font-size:0.85rem;color:var(--teal);text-decoration:none;margin-bottom:1rem;background:rgba(0,201,167,0.1);padding:0.4rem 0.8rem;border-radius:8px;border:1px solid rgba(0,201,167,0.2);">
                         <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                         View Attachment
                       </a>`
                : ''}

                ${p.aiMatchReason
                ? `<div class="pc-ai-reason">
         AI Analysis: ${escHtml(p.aiMatchReason)}
       </div>`
                : ''}

${p.attachmentUrl
                ? `<div style="margin-bottom:0.85rem;">
         <a href="${p.attachmentUrl}" target="_blank"
            style="display:inline-flex;align-items:center;gap:0.5rem;
                   padding:0.45rem 0.9rem;border-radius:9px;font-size:0.82rem;
                   background:var(--card2);border:1px solid var(--border2);
                   color:var(--teal);text-decoration:none;font-weight:600;
                   transition:border-color 0.2s;"
            onmouseover="this.style.borderColor='var(--teal)'"
            onmouseout="this.style.borderColor='var(--border2)'">
             <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2">
                 <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19
                          a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
             </svg>
             View Attachment / Resume
         </a>
       </div>`
                : ''}

<div class="pc-actions">
    <button class="btn-sm" onclick="viewFullProposal(${p.id})"
        style="background:var(--card2);border:1px solid var(--border2);
               color:var(--text2);transition:all 0.2s;"
        onmouseover="this.style.borderColor='var(--teal)';this.style.color='var(--teal)'"
        onmouseout="this.style.borderColor='var(--border2)';this.style.color='var(--text2)'">
        View Full
    </button>
    ${isPending
                ? `<button class="btn-accept" onclick="updateStatus(${p.id}, 'ACCEPTED')">
             Accept Proposal
           </button>
           <button class="btn-reject" onclick="updateStatus(${p.id}, 'REJECTED')">
             Reject
           </button>`
                : `<span class="status-badge ${statusClass}">${p.status}</span>`
            }
</div>
            </div>`;
        }).join('');
    }

    async function updateStatus(proposalId, status) {
        const action = status === 'ACCEPTED' ? 'accept' : 'reject';
        if (!confirm(`Are you sure you want to ${action} this proposal?`)) return;

        try {
            const res = await api.patch(`/api/v1/proposals/${proposalId}/status`, { status });

            if (res.ok) {
                showToast(status === 'ACCEPTED'
                    ? 'Proposal accepted! Project created.'
                    : 'Proposal rejected.');

                // Reload to show updated statuses
                setTimeout(() => loadProposals(), 1000);
            } else {
                const err = await res.json();
                showToast('Error: ' + (err.message || 'Something went wrong'), true);
            }
        } catch(e) {
            showToast('Failed to update proposal.', true);
        }
    }

    function showToast(message, isError = false) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.style.borderColor  = isError ? 'var(--rose)' : 'var(--teal)';
        toast.style.color        = isError ? 'var(--rose)' : 'var(--teal)';
        toast.style.display      = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }

    async function viewFullProposal(proposalId) {
        document.getElementById('proposal-modal').style.display = 'flex';
        document.getElementById('modal-body').innerHTML =
            '<div class="modal-loading">Loading…</div>';

        try {
            const res  = await api.get(`/api/v1/proposals/${proposalId}`);
            const data = await res.json();

            if (!res.ok) {
                document.getElementById('modal-body').innerHTML =
                    '<div class="modal-loading">Failed to load proposal.</div>';
                return;
            }

            const skills = Array.isArray(data.freelancerSkills)
                ? data.freelancerSkills
                : [];

            document.getElementById('modal-body').innerHTML = `
            <div class="modal-section">
                <div class="modal-label">Freelancer</div>
                <div style="display:flex;align-items:center;gap:0.75rem;
                            background:var(--bg2);border-radius:10px;
                            padding:0.85rem 1rem;border:1px solid var(--border);">
                    <div style="width:42px;height:42px;border-radius:50%;flex-shrink:0;
                                background:linear-gradient(135deg,var(--purple),var(--teal));
                                display:flex;align-items:center;justify-content:center;
                                font-weight:700;color:#fff;">
                        ${(data.freelancerName||'F')[0].toUpperCase()}
                    </div>
                    <div>
                        <div style="font-weight:700;">${escHtml(data.freelancerName||'Freelancer')}</div>
                        <div style="font-size:0.8rem;color:var(--text2);">
                            $${data.expectedRate}/hr
                            ${data.freelancerRating
                ? ` · ⭐ ${data.freelancerRating.toFixed(1)}`
                : ''}
                        </div>
                    </div>
                    ${data.aiMatchScore != null ? `
                    <div style="margin-left:auto;text-align:right;">
                        <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;
                                    color:${data.aiMatchBadge==='GREEN'?'var(--teal)':data.aiMatchBadge==='AMBER'?'var(--gold)':'var(--rose)'};">
                            ${data.aiMatchScore.toFixed(0)}%
                        </div>
                        <div style="font-size:0.72rem;color:var(--text3);">AI Match</div>
                    </div>` : ''}
                </div>
            </div>

            ${skills.length > 0 ? `
            <div class="modal-section">
                <div class="modal-label">Skills</div>
                <div style="display:flex;flex-wrap:wrap;gap:0.4rem;">
                    ${skills.map(s =>
                `<span class="skill-tag">${escHtml(s)}</span>`
            ).join('')}
                </div>
            </div>` : ''}

            <div class="modal-section">
                <div class="modal-label">Cover Letter</div>
                <div class="modal-value">${escHtml(data.coverLetter||'No cover letter provided.')}</div>
            </div>

            ${data.aiMatchReason ? `
            <div class="modal-section">
                <div class="modal-label">AI Analysis</div>
                <div class="modal-value" style="border-left:3px solid var(--teal);">
                    ${escHtml(data.aiMatchReason)}
                </div>
            </div>` : ''}

            ${data.attachmentUrl ? `
            <div class="modal-section">
                <div class="modal-label">Attachment</div>
                <a href="${data.attachmentUrl}" target="_blank"
                   style="display:inline-flex;align-items:center;gap:0.5rem;
                          padding:0.5rem 1rem;border-radius:10px;
                          background:var(--bg2);border:1px solid var(--border2);
                          color:var(--teal);font-size:0.85rem;text-decoration:none;
                          transition:border-color 0.2s;"
                   onmouseover="this.style.borderColor='var(--teal)'"
                   onmouseout="this.style.borderColor='var(--border2)'">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    Download Attachment
                </a>
            </div>` : ''}

            <div style="display:flex;gap:0.75rem;margin-top:1.5rem;">
                ${data.status === 'PENDING' ? `
                <button class="btn-accept" style="flex:2;"
                        onclick="closeProposalModal();updateStatus(${data.id},'ACCEPTED')">
                    Accept Proposal
                </button>
                <button class="btn-reject" style="flex:1;"
                        onclick="closeProposalModal();updateStatus(${data.id},'REJECTED')">
                    Reject
                </button>` : `
                <span class="status-badge status-${(data.status||'pending').toLowerCase()}"
                      style="margin:0 auto;">
                    ${data.status}
                </span>`}
            </div>`;
        } catch(e) {
            document.getElementById('modal-body').innerHTML =
                '<div class="modal-loading">Network error. Please try again.</div>';
        }
    }

    function closeProposalModal() {
        document.getElementById('proposal-modal').style.display = 'none';
    }

    loadProposals();

    setInterval(() => {
        loadProposals();
    }, 3000);
</script>
</body>
</html>
