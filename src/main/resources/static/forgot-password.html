<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password — SkillBridge</title>
    <meta name="description" content="SkillBridge connects top Indian freelancers with clients. AI-powered proposal scoring, real-time chat, and verified reviews.">
    <meta name="theme-color" content="#00C9A7">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%2300C9A7'/%3E%3Cstop offset='100%25' stop-color='%23F5A623'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='8' fill='url(%23g)'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-family='Arial Black,sans-serif' font-weight='900' font-size='14' fill='white'%3ESB%3C/text%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="/js/theme.js"></script>
    <style>
        *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
        :root {
          --bg:#060D1A; --bg2:#0B1425; --card:#0D1829; --card2:#111f38;
          --teal:#00C9A7; --teal-dk:#00A389; --gold:#F5A623;
          --rose:#FF6B8A; --text:#E8F0FE; --text2:#8BA3C7; --text3:#5A7090;
          --border:#1A2D4A; --border2:#243650;
        }
        [data-theme="light"] {
          --bg:#F8FAFC; --bg2:#F1F5F9; --card:#FFFFFF; --card2:#F8FAFC;
          --text:#0F172A; --text2:#475569; --text3:#64748B;
          --border:#E2E8F0; --border2:#CBD5E1;
        }
        body { font-family:'DM Sans',sans-serif; background:var(--bg);
          color:var(--text); min-height:100vh;
          display:flex; flex-direction:column; align-items:center;
          justify-content: space-between;
             padding:1.5rem;
              padding-top: 3rem;
              }

        .logo { font-family:'Syne',sans-serif; font-weight:800; font-size:1.5rem;
          background:linear-gradient(135deg,var(--teal),var(--gold));
          -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
          text-align:center; margin-bottom:0.5rem; }
        h2 { font-family:'Syne',sans-serif; font-weight:700; font-size:1.2rem;
          text-align:center; margin-bottom:0.5rem; }
        .subtitle { font-size:0.85rem; color:var(--text2); text-align:center;
          margin-bottom:2rem; line-height:1.6; }
        label { display:block; font-size:0.85rem; font-weight:600;
          color:var(--text2); margin-bottom:0.4rem; }
        input {
          width:100%; padding:0.8rem 1rem; border-radius:10px;
          background:var(--bg2); border:1px solid var(--border2);
          color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.9rem;
          outline:none; transition:border-color 0.2s; margin-bottom:1.25rem;
        }
        input:focus { border-color:var(--teal); box-shadow:0 0 0 3px rgba(0,201,167,0.1); }
        input::placeholder { color:var(--text3); }
        .btn {
          width:100%; padding:0.85rem; border-radius:12px; font-size:0.95rem;
          font-weight:700; cursor:pointer; font-family:'DM Sans',sans-serif;
          border:none; background:linear-gradient(135deg,var(--teal),var(--teal-dk));
          color:#000; transition:opacity 0.2s;
        }
        .btn:hover { opacity:0.9; }
        .btn:disabled { opacity:0.5; cursor:not-allowed; }
        .msg { padding:0.85rem 1rem; border-radius:10px; font-size:0.85rem;
          font-weight:600; text-align:center; margin-bottom:1rem; display:none; }
        .msg.success { background:rgba(0,201,167,0.08);
          border:1px solid rgba(0,201,167,0.2); color:var(--teal); }
        .msg.error   { background:rgba(255,107,138,0.08);
          border:1px solid rgba(255,107,138,0.2); color:var(--rose); }

        .back-link:hover { color:var(--teal); }

        .page-bg {
    position:fixed; inset:0; z-index:0; pointer-events:none;
    background:
        radial-gradient(ellipse 60% 50% at 20% 20%, rgba(0,201,167,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 80%, rgba(123,97,255,0.05) 0%, transparent 60%);
}
.grid-bg {
    position:fixed; inset:0; z-index:0; pointer-events:none;
    background-image:
        linear-gradient(#1A2D4A 1px, transparent 1px),
        linear-gradient(90deg, #1A2D4A 1px, transparent 1px);
    background-size:50px 50px; opacity:0.18;
    mask-image:radial-gradient(ellipse 80% 80% at 50% 50%, black 20%, transparent 75%);
    -webkit-mask-image:radial-gradient(ellipse 80% 80% at 50% 50%, black 20%, transparent 75%);
}

        .card {
  background:var(--card); border:1px solid var(--border2);
  border-top: 2px solid rgba(0,201,167,0.4);
  border-radius:20px; padding:2.5rem; width:100%; max-width:420px;
  position:relative; z-index:1; overflow:hidden;
  animation: cardIn 0.5s cubic-bezier(0.22,1,0.36,1);
}
.card::before {
    content:''; position:absolute;
    top:0; left:-100%; width:100%; height:2px;
    background:linear-gradient(90deg, transparent, var(--teal), transparent);
    animation: shimmer 4s ease-in-out infinite;
}
@keyframes cardIn {
    from { opacity:0; transform:translateY(20px); }
    to   { opacity:1; transform:none; }
}
@keyframes shimmer { to { left:200%; } }

        .btn { display:flex; align-items:center; justify-content:center; }
@keyframes spin { to { transform:rotate(360deg); } }


.back-link {
  display:flex; align-items:center; justify-content:center; gap:0.3rem;
  text-align:center; margin-top:1.25rem;
  font-size:0.85rem; color:var(--text2); text-decoration:none;
  transition: color 0.2s;
}
    </style>
</head>
<body style="position:relative;">
<button class="notif-btn" id="theme-toggle" onclick="toggleTheme()" aria-label="Toggle Theme" style="position:fixed; top:1.5rem; right:1.5rem; z-index:100; width:36px; height:36px; padding:8px; display:flex; align-items:center; justify-content:center; border:1px solid var(--border2); border-radius:10px; background:var(--card); cursor:pointer; color:var(--text2);">
    <span class="theme-toggle-icon"></span>
</button>
<div class="page-bg"></div>
<div class="grid-bg"></div>


<div class="card" style="margin-bottom:auto;">
    <div style="display:flex;justify-content:center;margin-bottom:1rem;">
        <div style="width:48px;height:48px;border-radius:14px;
                background:rgba(0,201,167,0.08);
                border:1px solid rgba(0,201,167,0.2);
                display:flex;align-items:center;justify-content:center;">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
                 stroke="var(--teal)" stroke-width="1.8">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
        </div>
    </div>
    <div class="logo">SkillBridge</div>
    <h2>Forgot your password?</h2>
    <p class="subtitle">Enter your email and we'll send you a link to reset your password.</p>

    <div class="msg" id="msg"></div>

    <div id="form-section">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com"
               onkeydown="if(event.key==='Enter') sendReset()">
        <button class="btn" id="submit-btn" onclick="sendReset()">
            <div class="btn-spinner" id="btn-spinner" style="display:none;
         width:16px;height:16px;border-radius:50%;
         border:2px solid rgba(0,0,0,0.3);border-top-color:#000;
         animation:spin 0.7s linear infinite;margin-right:0.5rem;"></div>
            <span id="btn-text">Send Reset Link</span>
        </button>
    </div>

    <a href="/login.html" class="back-link">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5">
        <line x1="19" y1="12" x2="5" y2="12"/>
            <polyline points="12 19 5 12 12 5"/>
        </svg>
        Back to Login
    </a>
</div>

<div style="position:relative;z-index:1;text-align:center;
     padding:1.25rem;border-top:1px solid var(--border);
     font-size:0.8rem;color:var(--text3);width:100%;align-self:stretch;">
    © 2026 SkillBridge &nbsp;·&nbsp;
    <a href="/privacy.html" style="color:var(--text3);text-decoration:none;">Privacy Policy</a>
    &nbsp;·&nbsp;
    <a href="#" style="color:var(--text3);text-decoration:none;">Terms</a>
</div>

<script>
    async function sendReset() {
        const email = document.getElementById('email').value.trim();
        const btn   = document.getElementById('submit-btn');

        // ── Validate BEFORE touching UI ──────────────────────
        if (!email) {
            showMsg('Please enter your email address.', 'error');
            return;
        }
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email)) {
            showMsg('Please enter a valid email address.', 'error');
            return;
        }

        // ── Loading state ─────────────────────────────────────
        btn.disabled = true;
        document.getElementById('btn-spinner').style.display = 'block';
        document.getElementById('btn-text').textContent = 'Sending…';
        document.getElementById('msg').style.display = 'none';

        try {
            const res = await fetch('/api/v1/auth/password/forgot', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            const data = await res.json();

            // ── Success ───────────────────────────────────────
            showMsg(
                data.message || 'If that email exists, a reset link has been sent.',
                'success'
            );
            document.getElementById('btn-spinner').style.display = 'none';
            document.getElementById('btn-text').textContent = 'Link Sent';
            document.getElementById('form-section').style.opacity = '0.5';
            document.getElementById('form-section').style.pointerEvents = 'none';

        } catch (e) {
            // ── Network error ─────────────────────────────────
            showMsg('Network error. Please try again.', 'error');
            btn.disabled = false;
            document.getElementById('btn-spinner').style.display = 'none';
            document.getElementById('btn-text').textContent = 'Send Reset Link';
        }
    }

    function showMsg(text, type) {
        const msg  = document.getElementById('msg');
        const icon = type === 'success'
            ? `<svg width="15" height="15" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                    stroke-linejoin="round" style="flex-shrink:0">
                   <polyline points="20 6 9 17 4 12"/>
               </svg>`
            : `<svg width="15" height="15" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                    stroke-linejoin="round" style="flex-shrink:0">
                   <circle cx="12" cy="12" r="10"/>
                   <line x1="12" y1="8" x2="12" y2="12"/>
                   <line x1="12" y1="16" x2="12.01" y2="16"/>
               </svg>`;
        msg.innerHTML  = `<span style="display:flex;align-items:center;gap:0.5rem;justify-content:center">${icon}${text}</span>`;
        msg.className  = 'msg ' + type;
        msg.style.display = 'block';
    }
</script>
</body>
</html>
