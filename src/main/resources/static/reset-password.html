<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — SkillBridge</title>
    <meta name="description" content="SkillBridge connects top Indian freelancers with clients. AI-powered proposal scoring, real-time chat, and verified reviews.">
    <meta name="theme-color" content="#00C9A7">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%2300C9A7'/%3E%3Cstop offset='100%25' stop-color='%23F5A623'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='8' fill='url(%23g)'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-family='Arial Black,sans-serif' font-weight='900' font-size='14' fill='white'%3ESB%3C/text%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">    <style>
        *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
        :root {
          --bg:#060D1A; --card:#0D1829;
          --teal:#00C9A7; --teal-dk:#00A389; --gold:#F5A623;
          --rose:#FF6B8A; --text:#E8F0FE; --text2:#8BA3C7; --text3:#5A7090;
          --border:#1A2D4A; --border2:#243650;
        }
        body { font-family:'DM Sans',sans-serif; background:var(--bg);
          color:var(--text); min-height:100vh;
          display:flex; flex-direction:column; align-items:center;
          justify-content:center; padding:1.5rem; }

        .logo { font-family:'Syne',sans-serif; font-weight:800; font-size:1.5rem;
          background:linear-gradient(135deg,var(--teal),var(--gold));
          -webkit-background-clip:text; -webkit-text-fill-color:transparent;
          text-align:center; margin-bottom:0.5rem; }
        h2 { font-family:'Syne',sans-serif; font-weight:700; font-size:1.2rem;
          text-align:center; margin-bottom:2rem; }
        label { display:block; font-size:0.85rem; font-weight:600;
          color:var(--text2); margin-bottom:0.4rem; }
        .input-wrap { position:relative; margin-bottom:1.25rem; }
        input {
          width:100%; padding:0.8rem 2.75rem 0.8rem 1rem; border-radius:10px;
          background:#0B1425; border:1px solid var(--border2);
          color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.9rem;
          outline:none; transition:border-color 0.2s;
        }
        input:focus { border-color:var(--teal); box-shadow:0 0 0 3px rgba(0,201,167,0.1); }
        input::placeholder { color:var(--text3); }
        .toggle-pw {
          position:absolute; right:0.75rem; top:50%; transform:translateY(-50%);
          background:none; border:none; color:var(--text3); cursor:pointer;
          padding:0.25rem;
        }
        .strength-bar { height:4px; border-radius:99px; background:var(--border2);
          margin-top:-0.9rem; margin-bottom:1.25rem; overflow:hidden; }
        .strength-fill { height:100%; border-radius:99px; width:0%;
          transition:width 0.3s, background 0.3s; }
        .hint { font-size:0.75rem; color:var(--text3); margin-top:-1rem;
          margin-bottom:1.25rem; }
        .btn {
          width:100%; padding:0.85rem; border-radius:12px; font-size:0.95rem;
          font-weight:700; cursor:pointer; font-family:'DM Sans',sans-serif;
          border:none; background:linear-gradient(135deg,var(--teal),var(--teal-dk));
          color:#000; transition:opacity 0.2s;
        }
        .btn:hover { opacity:0.9; }
        .btn:disabled { opacity:0.5; cursor:not-allowed; }
        .msg { padding:0.85rem 1rem; border-radius:10px; font-size:0.85rem;
          font-weight:600; text-align:center; margin-bottom:1rem; display:none; }
        .msg.success { background:rgba(0,201,167,0.08);
          border:1px solid rgba(0,201,167,0.2); color:var(--teal); }
        .msg.error   { background:rgba(255,107,138,0.08);
          border:1px solid rgba(255,107,138,0.2); color:var(--rose); }
        .expired-state { text-align:center; padding:1rem; }
        .expired-state p { color:var(--text2); margin-bottom:1.25rem; font-size:0.9rem; }

        .page-bg {
    position:fixed; inset:0; z-index:0; pointer-events:none;
    background:
        radial-gradient(ellipse 60% 50% at 20% 20%, rgba(0,201,167,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 80%, rgba(123,97,255,0.05) 0%, transparent 60%);
}
.grid-bg {
    position:fixed; inset:0; z-index:0; pointer-events:none;
    background-image:
        linear-gradient(#1A2D4A 1px, transparent 1px),
        linear-gradient(90deg, #1A2D4A 1px, transparent 1px);
    background-size:50px 50px; opacity:0.18;
    mask-image:radial-gradient(ellipse 80% 80% at 50% 50%, black 20%, transparent 75%);
}

        .card {
    background: var(--card);
    border: 1px solid var(--border2);
    border-top: 2px solid rgba(0,201,167,0.4);
    border-radius: 20px;
    padding: 2.5rem;
    width: 100%; max-width: 420px;
    position: relative; z-index: 1;
    overflow: hidden;
    animation: cardIn 0.5s cubic-bezier(0.22,1,0.36,1);
}
.card::before {
    content:''; position:absolute;
    top:0; left:-100%; width:100%; height:2px;
    background:linear-gradient(90deg, transparent, var(--teal), transparent);
    animation: shimmer 4s ease-in-out infinite;
}
@keyframes cardIn {
    from { opacity:0; transform:translateY(20px); }
    to   { opacity:1; transform:none; }
}
@keyframes shimmer { to { left:200%; } }

    @keyframes spin { to { transform:rotate(360deg); } }

    </style>
</head>
<body>
<div class="page-bg"></div>
<div class="grid-bg"></div>
<div class="card">
    <div class="logo">SkillBridge</div>
    <h2>Set new password</h2>

    <div class="msg" id="msg"></div>

    <!-- Loading state -->
    <div id="loading" style="text-align:center;padding:2rem;">
        <div style="width:28px;height:28px;border-radius:50%;
                    border:2px solid var(--border2);
                    border-top-color:var(--teal);
                    animation:spin 0.7s linear infinite;
                    margin:0 auto 0.75rem;"></div>
        <p style="color:var(--text2);font-size:0.88rem;">Validating reset link…</p>
    </div>

    <!-- Expired state -->
    <div id="expired-state" style="display:none;" class="expired-state">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none"
             style="stroke:#FF6B8A" stroke-width="1.5"
             style="margin:0 auto 1rem;display:block;">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <p>This reset link is invalid or has expired.</p>
        <button class="btn" onclick="window.location.href='/forgot-password.html'">
            Request New Link
        </button>
    </div>

    <!-- Form -->
    <div id="form-section" style="display:none;">
        <p style="text-align:center;font-size:0.88rem;color:var(--text2);
          margin-top:-1.5rem;margin-bottom:1.75rem;line-height:1.6;">
            Choose a strong password for your account.
        </p>
        <div>
            <label>New Password</label>
            <div class="input-wrap">
                <input type="password" id="new-password"
                       placeholder="Min 8 characters"
                       oninput="checkStrength()">
                <button class="toggle-pw" type="button"
                        onclick="togglePw('new-password',this)">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                </button>
            </div>
            <div class="strength-bar">
                <div class="strength-fill" id="strength-fill"></div>
            </div>
            <div class="hint" id="strength-hint"></div>
        </div>
        <div>
            <label>Confirm Password</label>
            <div class="input-wrap">
                <input type="password" id="confirm-password"
                       placeholder="Repeat new password"
                oninput="checkMatch()">
                <button class="toggle-pw" type="button"
                        onclick="togglePw('confirm-password',this)">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                </button>
            </div>

            <div id="match-hint" style="font-size:0.75rem;margin-top:-1rem;
             margin-bottom:1.25rem;min-height:1rem;"></div>
        </div>
        <button class="btn" id="reset-btn" onclick="doReset()">
            Reset Password
        </button>
    </div>
</div>

<div style="position:relative;z-index:1;text-align:center;
     padding:1.25rem;border-top:1px solid var(--border);
     font-size:0.8rem;color:var(--text3);width:100%;align-self:stretch;">
    © 2026 SkillBridge &nbsp;·&nbsp;
    <a href="/privacy.html" style="color:var(--text3);text-decoration:none;">Privacy Policy</a>
    &nbsp;·&nbsp;
    <a href="#" style="color:var(--text3);text-decoration:none;">Terms</a>
</div>

<script>
    const token = new URLSearchParams(window.location.search).get('token');

    async function validateToken() {
        if (!token) {
            showExpired();
            return;
        }
        try {
            const res = await fetch(
                `/api/v1/auth/password/validate?token=${token}`);
            if (res.ok) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('form-section').style.display = 'block';
            } else {
                showExpired();
            }
        } catch(e) {
            showExpired();
        }
    }

    function showExpired() {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('expired-state').style.display = 'block';
    }

    function togglePw(id, btn) {
    const input = document.getElementById(id);
    const isText = input.type === 'password';
    input.type = isText ? 'text' : 'password';
    btn.style.color = isText ? 'var(--teal)' : 'var(--text3)';
    btn.innerHTML = isText
        ? `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
               <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
               <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
               <line x1="1" y1="1" x2="23" y2="23"/>
           </svg>`
        : `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
               <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
               <circle cx="12" cy="12" r="3"/>
           </svg>`;
}

    function checkStrength() {
        const pw   = document.getElementById('new-password').value;
        const fill = document.getElementById('strength-fill');
        const hint = document.getElementById('strength-hint');
        let score  = 0;
        if (pw.length >= 8)  score++;
        if (pw.length >= 12) score++;
        if (/[A-Z]/.test(pw)) score++;
        if (/[0-9]/.test(pw)) score++;
        if (/[^A-Za-z0-9]/.test(pw)) score++;

        const levels = [
            { pct:'20%', color:'var(--rose)',   label:'Very weak'  },
            { pct:'40%', color:'var(--rose)',   label:'Weak'       },
            { pct:'60%', color:'var(--gold)',   label:'Fair'       },
            { pct:'80%', color:'var(--gold)',   label:'Good'       },
            { pct:'100%',color:'var(--teal)',   label:'Strong'     },
        ];
        const lvl = levels[Math.min(score, 4)];
        fill.style.width      = pw ? lvl.pct   : '0%';
        fill.style.background = lvl.color;
        hint.textContent      = pw ? lvl.label : '';
        hint.style.color      = lvl.color;
    }

    function checkMatch() {
        const pw  = document.getElementById('new-password').value;
        const cf  = document.getElementById('confirm-password').value;
        const el  = document.getElementById('match-hint');
        if (!cf) { el.textContent = ''; return; }
        if (pw === cf) {
            el.textContent = 'Passwords match';
            el.style.color = 'var(--teal)';
        } else {
            el.textContent = 'Passwords do not match';
            el.style.color = 'var(--rose)';
        }
    }

    async function doReset() {
        const newPassword = document.getElementById('new-password').value;
        const confirm     = document.getElementById('confirm-password').value;

        if (newPassword.length < 8) {
            showMsg('Password must be at least 8 characters.', 'error');
            return;
        }
        if (newPassword !== confirm) {
            showMsg('Passwords do not match.', 'error');
            return;
        }

        const btn = document.getElementById('reset-btn');
        btn.disabled = true;
        btn.innerHTML = 'Resetting…';

        try {
            const res = await fetch('/api/v1/auth/password/reset', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, newPassword })
            });
            const data = await res.json();

            if (res.ok) {
                showMsg('Password reset successfully! Redirecting to login…',
                    'success');
                document.getElementById('form-section').style.opacity = '0.5';
                document.getElementById('form-section').style.pointerEvents = 'none';
                setTimeout(() => window.location.replace('/login.html'), 2500);
            } else {
                showMsg(data.message || 'Reset failed.', 'error');
                btn.disabled = false;
                btn.innerHTML  = 'Reset Password';
            }
        } catch(e) {
            showMsg('Network error. Please try again.', 'error');
            btn.disabled = false;
            btn.innerHTML = 'Reset Password';
        }
    }

    function showMsg(text, type) {
        const msg = document.getElementById('msg');
        const icon = type === 'success'
            ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="flex-shrink:0"><polyline points="20 6 9 17 4 12"/></svg>`
            : `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="flex-shrink:0"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`;
        msg.innerHTML = `<span style="display:flex;align-items:center;gap:0.5rem;justify-content:center">${icon}${text}</span>`;
        msg.className   = 'msg ' + type;
        msg.style.display = 'block';
    }

    validateToken();
</script>
</body>
</html>
