<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%2300C9A7'/%3E%3Cstop offset='100%25' stop-color='%23F5A623'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='8' fill='url(%23g)'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-family='Arial Black,sans-serif' font-weight='900' font-size='14' fill='white'%3ESB%3C/text%3E%3C/svg%3E">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile — SkillBridge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
        :root {
          --bg:#060D1A; --bg2:#0B1425; --card:#0D1829; --card2:#111f38;
          --teal:#00C9A7; --teal-dk:#00A389; --gold:#F5A623; --purple:#7B61FF;
          --rose:#FF6B8A; --text:#E8F0FE; --text2:#8BA3C7; --text3:#4A6080;
          --border:#1A2D4A; --border2:#243650;
        }
        body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
        nav {
          display:flex; align-items:center; justify-content:space-between;
          padding:0 5%; height:64px; background:rgba(6,13,26,0.95);
          border-bottom:1px solid var(--border); position:sticky; top:0; z-index:50;
        }
        .nav-logo { font-family:'Syne',sans-serif; font-weight:800; font-size:1.35rem;
          background:linear-gradient(135deg,var(--teal),var(--gold));
          -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .nav-links { display:flex; gap:1.5rem; }
        .nav-links a { font-size:0.88rem; color:var(--text2); text-decoration:none; transition:color 0.2s; }
        .nav-links a:hover { color:var(--teal); }
        .btn-sm { padding:0.4rem 1rem; border-radius:8px; font-size:0.85rem; font-weight:600; cursor:pointer; font-family:'DM Sans',sans-serif; }
        .btn-logout { background:transparent; border:1px solid var(--border2); color:var(--text2); transition:all 0.2s; }
        .btn-logout:hover { border-color:var(--rose); color:var(--rose); }

        main { max-width:800px; margin:0 auto; padding:2rem 5%; }
        .back-link { display:inline-flex; align-items:center; gap:0.4rem; color:var(--text2);
          text-decoration:none; font-size:0.85rem; margin-bottom:1.5rem; transition:color 0.2s; }
        .back-link:hover { color:var(--teal); }

        /* Avatar section */
        .avatar-section {
          background:var(--card); border:1px solid var(--border2); border-radius:20px;
          padding:2rem; margin-bottom:1.25rem;
          display:flex; align-items:center; gap:2rem;
        }
        .avatar-wrap { position:relative; flex-shrink:0; }
        .avatar-img {
          width:90px; height:90px; border-radius:50%; object-fit:cover;
          border:3px solid var(--border2); background:var(--bg2);
          display:flex; align-items:center; justify-content:center;
          font-family:'Syne',sans-serif; font-weight:800; font-size:2rem; color:var(--teal);
        }
        .avatar-img img { width:100%; height:100%; border-radius:50%; object-fit:cover; }
        .avatar-upload-btn {
          position:absolute; bottom:0; right:0;
          width:28px; height:28px; border-radius:50%; border:none; cursor:pointer;
          background:var(--teal); color:#000; font-size:0.9rem;
          display:flex; align-items:center; justify-content:center;
          transition:opacity 0.2s;
        }
        .avatar-upload-btn:hover { opacity:0.85; }
        .avatar-info h2 { font-family:'Syne',sans-serif; font-weight:800; font-size:1.25rem; margin-bottom:0.25rem; }
        .avatar-info p  { color:var(--text2); font-size:0.88rem; margin-bottom:0.75rem; }

        /* Completion bar */
        .completion-wrap { margin-top:0.5rem; }
        .completion-label { display:flex; justify-content:space-between; font-size:0.8rem; color:var(--text2); margin-bottom:0.35rem; }
        .completion-bar {
          height:6px; background:var(--border2); border-radius:99px; overflow:hidden;
        }
        .completion-fill {
          height:100%; border-radius:99px;
          background:linear-gradient(90deg,var(--teal),var(--gold));
          transition:width 0.5s ease;
        }

        /* Form cards */
        .form-card { background:var(--card); border:1px solid var(--border2); border-radius:20px; padding:1.75rem; margin-bottom:1.25rem; }
        .section-title {
          font-family:'Syne',sans-serif; font-weight:700; font-size:0.82rem;
          color:var(--teal); text-transform:uppercase; letter-spacing:0.08em;
          margin-bottom:1.25rem; display:flex; align-items:center; gap:0.5rem;
        }
        .section-title::after { content:''; flex:1; height:1px; background:var(--border); }
        .form-row { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
        @media(max-width:600px) { .form-row { grid-template-columns:1fr; } }
        .form-group { margin-bottom:1.25rem; }
        .form-group:last-child { margin-bottom:0; }
        label { display:block; font-size:0.85rem; font-weight:600; color:var(--text2); margin-bottom:0.4rem; }
        input, textarea, select {
          width:100%; padding:0.75rem 1rem; border-radius:10px;
          background:var(--bg2); border:1px solid var(--border2);
          color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.9rem;
          transition:border-color 0.2s; outline:none; -webkit-appearance:none;
        }
        input:focus, textarea:focus, select:focus { border-color:var(--teal); box-shadow:0 0 0 3px rgba(0,201,167,0.1); }
        input::placeholder, textarea::placeholder { color:var(--text3); }
        textarea { resize:vertical; min-height:100px; line-height:1.6; }
        select option { background:var(--bg2); }

        /* Skills chips */
        .skills-tags {
          display:flex; flex-wrap:wrap; gap:0.4rem;
          background:var(--bg2); border:1px solid var(--border2); border-radius:10px;
          padding:0.5rem; min-height:48px; cursor:text; transition:border-color 0.2s;
        }
        .skills-tags:focus-within { border-color:var(--teal); box-shadow:0 0 0 3px rgba(0,201,167,0.1); }
        .skill-chip {
          display:inline-flex; align-items:center; gap:0.3rem;
          background:rgba(123,97,255,0.15); border:1px solid rgba(123,97,255,0.3);
          color:var(--purple); border-radius:99px; padding:0.2rem 0.65rem; font-size:0.78rem; font-weight:600;
        }
        .skill-chip button { background:none; border:none; color:var(--purple); cursor:pointer; font-size:0.9rem; padding:0; opacity:0.7; }
        .skill-chip button:hover { opacity:1; }
        .skills-input { border:none; background:transparent; outline:none; flex:1; min-width:120px; color:var(--text); font-size:0.85rem; padding:0.25rem 0.35rem; }
        .hint { font-size:0.78rem; color:var(--text3); margin-top:0.35rem; }

        /* Save button */
        .save-row { display:flex; align-items:center; justify-content:space-between; margin-top:1.5rem; gap:1rem; }
        .btn-save {
          padding:0.85rem 2.5rem; border-radius:12px; font-size:0.95rem; font-weight:700;
          cursor:pointer; font-family:'DM Sans',sans-serif; border:none;
          background:linear-gradient(135deg,var(--teal),var(--teal-dk)); color:#000; transition:opacity 0.2s;
        }
        .btn-save:hover { opacity:0.9; }
        .btn-save:disabled { opacity:0.5; cursor:not-allowed; }
        .save-status { font-size:0.85rem; }
        .save-status.success { color:var(--teal); }
        .save-status.error   { color:var(--rose); }

        /* Stats row */
        .stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:1rem; margin-bottom:1.25rem; }
        .stat-card {
          background:var(--card); border:1px solid var(--border2); border-radius:16px;
          padding:1.25rem; text-align:center;
        }
        .stat-num { font-family:'Syne',sans-serif; font-weight:800; font-size:1.5rem; color:var(--teal); }
        .stat-lbl { font-size:0.78rem; color:var(--text3); margin-top:0.2rem; }

        /* Back link arrow */
.back-link::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    border-left: 2px solid currentColor;
    border-bottom: 2px solid currentColor;
    transform: rotate(45deg) translateY(-1px);
}

/* Avatar section entrance */
.avatar-section {
    animation: cardIn 0.4s ease both;
    border-top: 2px solid rgba(0,201,167,0.2);
}
@keyframes cardIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: none; }
}

/* Form cards staggered entrance */
.form-card {
    animation: cardIn 0.4s ease both;
    border-top: 2px solid rgba(0,201,167,0.15);
    transition: border-color 0.2s, box-shadow 0.2s;
}
.form-card:focus-within {
    border-color: rgba(0,201,167,0.35);
    box-shadow: 0 4px 24px rgba(0,0,0,0.2);
}
.form-card:nth-child(3) { animation-delay: 0.08s; }
.form-card:nth-child(4) { animation-delay: 0.14s; }

/* Section title — remove emoji, add line already there, improve */
.section-title {
    font-size: 0.78rem;
    letter-spacing: 0.1em;
}

/* Stat cards hover */
.stat-card {
    transition: border-color 0.2s, transform 0.15s;
}
.stat-card:hover {
    border-color: rgba(0,201,167,0.3);
    transform: translateY(-2px);
}
.stat-num {
    background: linear-gradient(135deg, var(--teal), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* Avatar ring glow */
.avatar-img {
    box-shadow: 0 0 0 3px rgba(0,201,167,0.15);
    transition: box-shadow 0.2s;
}
.avatar-wrap:hover .avatar-img {
    box-shadow: 0 0 0 4px rgba(0,201,167,0.35);
}

/* Avatar upload button — teal glow */
.avatar-upload-btn {
    box-shadow: 0 2px 8px rgba(0,201,167,0.4);
}

/* Completion bar label */
.completion-label span:last-child {
    font-weight: 700;
    color: var(--teal);
}

/* Save button glow */
@keyframes glow-pulse {
    0%,100% { box-shadow: 0 4px 20px rgba(0,201,167,0.3); }
    50%      { box-shadow: 0 4px 32px rgba(0,201,167,0.55); }
}
.btn-save:not(:disabled) {
    animation: glow-pulse 2.5s ease-in-out infinite;
}

/* Save status slide in */
.save-status {
    animation: fadeIn 0.3s ease;
}
@keyframes fadeIn {
    from { opacity: 0; transform: translateX(-6px); }
    to   { opacity: 1; transform: none; }
}

/* Skill chip hover */
.skill-chip {
    transition: transform 0.15s;
}
.skill-chip:hover {
    transform: translateY(-1px);
}

/* Input focus left accent */
input:focus, textarea:focus {
    border-left: 3px solid var(--teal);
    padding-left: calc(1rem - 2px);
}

/* Portfolio URL input — gold focus */
#portfolio-url:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(245,166,35,0.1);
    border-left: 3px solid var(--gold);
}

/* Stats row entrance */
.stats-row {
    animation: cardIn 0.4s 0.05s ease both;
}

    </style>
</head>
<body>
<nav>
    <a href="/" class="nav-logo">SkillBridge</a>
    <div class="nav-links">
        <a href="#" id="dashboard-link">Dashboard</a>
    </div>
    <div style="display:flex;align-items:center;gap:0.75rem;">
        <button class="btn-sm btn-logout" onclick="logout()">Logout</button>
    </div>
</nav>

<main>
    <a href="#" id="back-link" class="back-link">Back to Dashboard</a>

    <!-- Avatar Section -->
    <div class="avatar-section">
        <div class="avatar-wrap">
            <div class="avatar-img" id="avatar-display">?</div>
            <button class="avatar-upload-btn" onclick="document.getElementById('avatar-input').click()" title="Upload photo">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                </svg>
            </button>
            <input type="file" id="avatar-input" accept="image/*" style="display:none" onchange="uploadAvatar(this)">
        </div>
        <div class="avatar-info" style="flex:1;">
            <h2 id="profile-name">Loading...</h2>
            <p id="profile-email"></p>
            <div class="completion-wrap">
                <div class="completion-label">
                    <span>Profile completion</span>
                    <span id="completion-pct">0%</span>
                </div>
                <div class="completion-bar">
                    <div class="completion-fill" id="completion-fill" style="width:0%"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Stats -->
    <div class="stats-row" id="stats-row" style="display:none;">
        <div class="stat-card">
            <div class="stat-num" id="stat1-num">0</div>
            <div class="stat-lbl" id="stat1-lbl">—</div>
        </div>
        <div class="stat-card">
            <div class="stat-num" id="stat2-num">0</div>
            <div class="stat-lbl" id="stat2-lbl">—</div>
        </div>
        <div class="stat-card">
            <div class="stat-num" id="stat3-num">0</div>
            <div class="stat-lbl" id="stat3-lbl">Member since</div>
        </div>
    </div>

    <!-- Basic Info -->
    <div class="form-card">
        <div class="section-title">Basic Info</div>
        <div class="form-row">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="Your full name">
            </div>
            <div class="form-group">
                <label>Location</label>
                <input type="text" id="location" placeholder="e.g. Mumbai, India">
            </div>
        </div>
        <div class="form-group">
            <label>Bio</label>
            <textarea id="bio" placeholder="Tell clients about yourself, your expertise and what makes you unique..."></textarea>
        </div>
    </div>

    <!-- Skills & Rate (freelancer only) -->
    <div class="form-card" id="freelancer-section" style="display:none;">        <div class="section-title">Skills & Rate</div>
        <div class="form-group">
            <label>Skills</label>
            <div class="skills-tags" id="skills-tags" onclick="document.getElementById('skill-input').focus()">
                <input type="text" id="skill-input" class="skills-input"
                       placeholder="Type a skill and press Enter…"
                       onkeydown="handleSkillKey(event)">
            </div>
            <div class="hint">Press Enter after each skill.</div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Hourly Rate (USD)</label>
                <input type="number" id="hourly-rate" placeholder="e.g. 45" min="1">
            </div>
            <div class="form-group">
                <label>Availability</label>
                <select id="availability">
                    <option value="">Select availability</option>
                    <option value="AVAILABLE">Available</option>
                    <option value="BUSY">Busy</option>
                    <option value="NOT_AVAILABLE">Not Available</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label>Portfolio URL</label>
            <input type="url" id="portfolio-url" placeholder="https://github.com/yourname">
            <div class="hint">Link to your GitHub, Behance, Dribbble, or personal site.</div>
        </div>
    </div>

    <!-- Save -->
    <div class="save-row">
        <span class="save-status" id="save-status"></span>
        <button class="btn-save" id="save-btn" onclick="saveProfile()">Save Changes</button>
    </div>
</main>

<script src="/js/utils.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script>
    requireAuth();

    let skills = [];
    let currentProfile = null;

    async function loadProfile() {
        try {
            const res     = await api.get('/api/v1/profile');
            currentProfile = await res.json();
            populateForm(currentProfile);
        } catch(e) {
            console.error('Failed to load profile:', e);
        }
    }

    function populateForm(p) {
        // Nav
        const role = p.role || localStorage.getItem('sb_role');
        const dash = role === 'CLIENT' ? '/dashboard-client.html' : '/dashboard-freelancer.html';
        document.getElementById('dashboard-link').href = dash;
        document.getElementById('back-link').href      = dash;

        // Avatar
        const avatarEl = document.getElementById('avatar-display');
        if (p.avatarUrl) {
            avatarEl.innerHTML = `<img src="${p.avatarUrl}" alt="Avatar">`;
        } else {
            avatarEl.textContent = (p.name||'?')[0].toUpperCase();
        }

        // Header
        document.getElementById('profile-name').textContent  = p.name || '—';
        document.getElementById('profile-email').textContent = p.email || '';

        // Completion
        const pct = p.profileCompletionPct || 0;
        document.getElementById('completion-pct').textContent  = pct + '%';
        document.getElementById('completion-fill').style.width = pct + '%';

        // Form fields
        document.getElementById('name').value     = p.name     || '';
        document.getElementById('location').value = p.location || '';
        document.getElementById('bio').value      = p.bio      || '';

        // Freelancer section
        if (role !== 'CLIENT') {
            document.getElementById('freelancer-section').style.display = 'block';
            document.getElementById('hourly-rate').value    = p.hourlyRate    || '';
            document.getElementById('availability').value   = p.availabilityStatus  || '';
            document.getElementById('portfolio-url').value  = p.portfolioUrl  || '';

            // Skills
            // Handle both array (from your API) and string (fallback)
skills = Array.isArray(p.skills)
    ? p.skills.filter(Boolean)
    : (p.skills ? p.skills.split(',').map(s=>s.trim()).filter(Boolean) : []);
            renderSkills();
        } else {
            document.getElementById('freelancer-section').style.display = 'none';
        }

        // Stats
        const statsRow = document.getElementById('stats-row');
        statsRow.style.display = 'grid';
        if (role === 'CLIENT') {
            document.getElementById('stat1-num').textContent = p.totalJobs || 0;
document.getElementById('stat1-lbl').textContent = 'Jobs Posted';
document.getElementById('stat2-num').textContent = p.totalProposals || 0;
document.getElementById('stat2-lbl').textContent = 'Total Proposals';
        } else {
            document.getElementById('stat1-num').textContent = p.totalProposals|| 0;
            document.getElementById('stat1-lbl').textContent = 'Proposals Sent';
            // Add after stats section in populateForm()
if (role !== 'CLIENT' && p.avgRating) {

    document.getElementById('stat2-num').textContent = p.avgRating.toFixed(1) + '/5';
    document.getElementById('stat2-lbl').textContent = 'Avg Rating';
}
else {
    document.getElementById('stat2-num').textContent = '—';
    document.getElementById('stat2-lbl').textContent = 'Avg Rating';
}
        }
        document.getElementById('stat3-num').textContent = p.createdAt
            ? new Date(p.createdAt).getFullYear() : '—';
    }

    // Skills
    function handleSkillKey(e) {
        if (e.key === 'Enter' || e.key === ',') {
            e.preventDefault();
            const val = e.target.value.trim().replace(/,$/,'').trim();
            if (!val || skills.length >= 15 || skills.includes(val)) return;
            skills.push(val.charAt(0).toUpperCase() + val.slice(1));
            renderSkills();
            e.target.value = '';
        }
    }

    function removeSkill(s) { skills = skills.filter(x=>x!==s); renderSkills(); }

    function renderSkills() {
        const input = document.getElementById('skill-input');
        const tags  = document.getElementById('skills-tags');
        tags.innerHTML = '';
        skills.forEach(s => {
            const chip = document.createElement('span');
            chip.className = 'skill-chip';
            chip.innerHTML = escHtml(s) + `<button onclick="removeSkill('${escHtml(s)}')" title="Remove">×</button>`;
            tags.appendChild(chip);
        });
        tags.appendChild(input);
    }

    // Save
    async function saveProfile() {
        const btn    = document.getElementById('save-btn');
        const status = document.getElementById('save-status');
        btn.disabled = true;
        btn.textContent = 'Saving…';
        status.textContent = '';

        const payload = {
            name:       document.getElementById('name').value.trim(),
            bio:        document.getElementById('bio').value.trim(),
            location:   document.getElementById('location').value.trim(),
            skills:     skills.join(','),
            hourlyRate: document.getElementById('hourly-rate').value
                            ? Number(document.getElementById('hourly-rate').value) : null,
            availabilityStatus: document.getElementById('availability').value || null,
            portfolioUrl: document.getElementById('portfolio-url').value.trim() || null
        };

        try {
            const res  = await api.put('/api/v1/profile', payload);
            const data = await res.json();
            if (res.ok) {
                populateForm(data);
                status.textContent = 'Saved successfully!';
                status.className   = 'save-status success';
            } else {
                status.textContent = data.message || 'Save failed.';
                status.className   = 'save-status error';
            }
        } catch(e) {
            status.textContent = 'Network error.';
            status.className   = 'save-status error';
        } finally {
            btn.disabled = false;
            btn.textContent = 'Save Changes';
            setTimeout(() => status.textContent = '', 4000);
        }
    }

    // Avatar upload
    async function uploadAvatar(input) {
        const file = input.files[0];
        if (!file) return;

        const formData = new FormData();
        formData.append('file', file);

        try {
            const token = localStorage.getItem('sb_jwt');
            const res   = await fetch('/api/v1/profile/avatar', {
                method: 'POST',
                headers: { Authorization: 'Bearer ' + token },
                body: formData
            });
            const data = await res.json();
            if (res.ok) {
                populateForm(data);
            } else {
                alert('Upload failed: ' + (data.message || 'Unknown error'));
            }
        } catch(e) {
            alert('Upload failed. Please try again.');
        }
    }

    loadProfile();
</script>
</body>
</html>
