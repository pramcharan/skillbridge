<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disputes — SkillBridge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
        :root {
          --bg:#060D1A; --card:#0D1829; --card2:#111f38;
          --teal:#00C9A7; --gold:#F5A623; --rose:#FF6B8A;
          --text:#E8F0FE; --text2:#8BA3C7; --text3:#4A6080;
          --border:#1A2D4A; --border2:#243650;
        }
        body { font-family:'DM Sans',sans-serif; background:var(--bg);
          color:var(--text); min-height:100vh; }
        nav { height:56px; background:var(--card);
              border-bottom:1px solid var(--border);
              display:flex; align-items:center;
              padding:0 1.5rem; gap:1rem; position:sticky; top:0; z-index:10; }
        .nav-logo { font-family:'Syne',sans-serif; font-weight:800;
          font-size:1.15rem;
          background:linear-gradient(135deg,var(--teal),var(--gold));
          -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .nav-links { margin-left:auto; display:flex; gap:1rem; }
        .nav-links a { font-size:0.85rem; color:var(--text2);
          text-decoration:none; transition:color 0.2s; }
        .nav-links a:hover { color:var(--teal); }

        .page { max-width:860px; margin:0 auto; padding:2rem 1.5rem; }
        .page-header { display:flex; align-items:center;
          justify-content:space-between; margin-bottom:2rem;
          flex-wrap:wrap; gap:1rem; }
        .page-title { font-family:'Syne',sans-serif; font-weight:800;
          font-size:1.5rem; }
        .page-subtitle { font-size:0.85rem; color:var(--text2); margin-top:0.25rem; }

        .btn-primary {
          padding:0.65rem 1.25rem; border-radius:10px; font-size:0.88rem;
          font-weight:700; cursor:pointer; font-family:'DM Sans',sans-serif;
          border:none; background:linear-gradient(135deg,var(--rose),#E05577);
          color:#fff; display:flex; align-items:center; gap:0.4rem;
          transition:opacity 0.2s;
        }
        .btn-primary:hover { opacity:0.9; }

        /* Status badge */
        .badge { padding:0.2rem 0.6rem; border-radius:99px;
          font-size:0.72rem; font-weight:700; }
        .badge-open        { background:rgba(74,144,226,0.1);
          color:#4A90E2; border:1px solid rgba(74,144,226,0.2); }
        .badge-under_review{ background:rgba(245,166,35,0.1);
          color:var(--gold); border:1px solid rgba(245,166,35,0.2); }
        .badge-resolved    { background:rgba(0,201,167,0.1);
          color:var(--teal); border:1px solid rgba(0,201,167,0.2); }
        .badge-closed      { background:rgba(74,96,128,0.15);
          color:var(--text3); border:1px solid var(--border2); }

        /* Cards */
        .dispute-card {
          background:var(--card); border:1px solid var(--border2);
          border-radius:16px; padding:1.5rem; margin-bottom:1rem;
          cursor:pointer; transition:border-color 0.2s;
        }
        .dispute-card:hover { border-color:var(--teal); }
        .card-header { display:flex; align-items:flex-start;
          justify-content:space-between; gap:1rem; margin-bottom:0.75rem; }
        .card-title { font-weight:700; font-size:0.95rem; }
        .card-project { font-size:0.8rem; color:var(--text2); margin-top:0.2rem; }
        .card-meta { display:flex; gap:1rem; flex-wrap:wrap; margin-top:0.6rem; }
        .meta-item { font-size:0.78rem; color:var(--text2); }
        .meta-item span { color:var(--text); font-weight:600; }

        /* Detail view */
        .detail-card {
          background:var(--card); border:1px solid var(--border2);
          border-radius:16px; padding:1.75rem; margin-bottom:1rem;
        }
        .detail-section { margin-bottom:1.5rem; }
        .detail-label { font-size:0.72rem; font-weight:700;
          letter-spacing:0.08em; text-transform:uppercase;
          color:var(--text3); margin-bottom:0.5rem; }
        .detail-text { font-size:0.9rem; color:var(--text); line-height:1.6; }
        .detail-text.muted { color:var(--text2); font-style:italic; }

        .evidence-list { display:flex; flex-wrap:wrap; gap:0.5rem; margin-top:0.4rem; }
        .evidence-link {
          padding:0.3rem 0.75rem; border-radius:7px; font-size:0.78rem;
          font-weight:600; color:var(--teal); text-decoration:none;
          background:rgba(0,201,167,0.06);
          border:1px solid rgba(0,201,167,0.15); transition:all 0.2s;
        }
        .evidence-link:hover { background:rgba(0,201,167,0.12); }

        .resolution-box {
          background:rgba(0,201,167,0.05);
          border:1px solid rgba(0,201,167,0.15);
          border-radius:12px; padding:1.25rem; margin-top:1rem;
        }
        .resolution-box .res-title {
          font-weight:700; color:var(--teal); margin-bottom:0.5rem; }

        /* Forms */
        .form-group { margin-bottom:1rem; }
        label { display:block; font-size:0.82rem; font-weight:600;
          color:var(--text2); margin-bottom:0.35rem; }
        input, textarea, select {
          width:100%; padding:0.75rem 1rem; border-radius:10px;
          background:#0B1425; border:1px solid var(--border2);
          color:var(--text); font-family:'DM Sans',sans-serif;
          font-size:0.88rem; outline:none; transition:border-color 0.2s;
        }
        textarea { resize:vertical; min-height:100px; }
        input:focus, textarea:focus, select:focus {
          border-color:var(--teal);
          box-shadow:0 0 0 3px rgba(0,201,167,0.1);
        }
        select option { background:var(--card); }

        .btn-row { display:flex; gap:0.75rem; margin-top:1.25rem; }
        .btn-cancel {
          flex:1; padding:0.75rem; border-radius:10px; font-size:0.88rem;
          font-weight:600; cursor:pointer; font-family:'DM Sans',sans-serif;
          border:1px solid var(--border2); background:transparent; color:var(--text2);
        }
        .btn-submit {
          flex:2; padding:0.75rem; border-radius:10px; font-size:0.88rem;
          font-weight:700; cursor:pointer; font-family:'DM Sans',sans-serif;
          border:none; background:linear-gradient(135deg,var(--rose),#E05577);
          color:#fff; transition:opacity 0.2s;
        }
        .btn-submit:hover { opacity:0.9; }
        .btn-submit.teal {
          background:linear-gradient(135deg,var(--teal),var(--teal-dk,#00A389));
          color:#000;
        }
        .btn-submit:disabled { opacity:0.4; cursor:not-allowed; }

        /* Back button */
        .back-btn {
          display:inline-flex; align-items:center; gap:0.4rem;
          font-size:0.85rem; color:var(--text2); cursor:pointer;
          background:none; border:none; font-family:'DM Sans',sans-serif;
          padding:0; margin-bottom:1.5rem; transition:color 0.2s;
        }
        .back-btn:hover { color:var(--teal); }

        /* Empty state */
        .empty { text-align:center; padding:4rem 2rem; }
        .empty h3 { font-size:1.1rem; color:var(--text2); margin-bottom:0.5rem; }
        .empty p  { font-size:0.85rem; color:var(--text3); }

        /* Modal */
        .modal-overlay {
          position:fixed; inset:0; background:rgba(0,0,0,0.7);
          z-index:1000; display:flex; align-items:center;
          justify-content:center; padding:1rem;
        }
        .modal {
          background:var(--card); border:1px solid var(--border2);
          border-radius:20px; padding:2rem; width:100%; max-width:520px;
          max-height:90vh; overflow-y:auto;
        }
        .modal h3 { font-family:'Syne',sans-serif; font-weight:700;
          font-size:1.1rem; margin-bottom:1.5rem; color:var(--rose); }

        /* Toast */
        .toast {
          position:fixed; bottom:1.5rem; right:1.5rem;
          padding:0.75rem 1.1rem; border-radius:10px;
          font-size:0.85rem; font-weight:600; z-index:2000;
          opacity:0; transform:translateY(6px);
          transition:all 0.3s; pointer-events:none;
        }
        .toast.show { opacity:1; transform:translateY(0); }
        .toast.success { background:#0D2A24; color:var(--teal);
          border:1px solid rgba(0,201,167,0.2); }
        .toast.error { background:#2A0D18; color:var(--rose);
          border:1px solid rgba(255,107,138,0.2); }
    </style>
</head>
<body>
<nav>
    <a href="/index.html" class="nav-logo">SkillBridge</a>
    <div class="nav-links">
        <a href="/my-projects.html">Projects</a>
        <a href="/community.html">Community</a>
        <a href="/profile.html">Profile</a>
    </div>
</nav>

<div class="page">
    <!-- List view -->
    <div id="list-view">
        <div class="page-header">
            <div>
                <h1 class="page-title">Disputes</h1>
                <p class="page-subtitle">Manage project disputes</p>
            </div>
            <button class="btn-primary" onclick="openRaiseModal()">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2.5">
                    <line x1="12" y1="5" x2="12" y2="19"/>
                    <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                Raise Dispute
            </button>
        </div>
        <div id="disputes-list"></div>
    </div>

    <!-- Detail view -->
    <div id="detail-view" style="display:none;">
        <button class="back-btn" onclick="showList()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2">
                <polyline points="15 18 9 12 15 6"/>
            </svg>
            Back to disputes
        </button>
        <div id="detail-content"></div>
    </div>
</div>

<!-- Raise Dispute Modal -->
<div class="modal-overlay" id="raise-modal" style="display:none;"
     onclick="if(event.target===this)closeRaiseModal()">
    <div class="modal">
        <h3>Raise a Dispute</h3>
        <div class="form-group">
            <label>Project ID</label>
            <input type="number" id="f-projectId" placeholder="Enter project ID">
        </div>
        <div class="form-group">
            <label>Reason (short title)</label>
            <input type="text" id="f-reason"
                   placeholder="e.g. Work not delivered as agreed">
        </div>
        <div class="form-group">
            <label>Description (min 20 characters)</label>
            <textarea id="f-description" rows="4"
                      placeholder="Describe the issue in detail…"></textarea>
        </div>
        <div class="form-group">
            <label>Evidence URLs (optional, comma-separated)</label>
            <input type="text" id="f-evidence"
                   placeholder="https://cloudinary.com/…, https://…">
        </div>
        <div class="btn-row">
            <button class="btn-cancel" onclick="closeRaiseModal()">
                Cancel
            </button>
            <button class="btn-submit" id="raise-btn"
                    onclick="raiseDispute()">
                Submit Dispute
            </button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>
<script src="/js/api.js"></script>
<script>
    let disputes    = [];
    let currentUser = null;

    async function init() {
        try {
            const res   = await api.get('/api/v1/users/me');
            currentUser = await res.json();
        } catch(e) {
            window.location.href = '/login.html';
            return;
        }

        // Check for dispute id in URL
        const params = new URLSearchParams(window.location.search);
        const id     = params.get('id');
        if (id) {
            loadDetail(id);
        } else {
            loadDisputes();
        }
    }

    async function loadDisputes() {
        try {
            const res  = await api.get('/api/v1/disputes/me');
            disputes   = await res.json();
            renderList();
        } catch(e) {
            showToast('Failed to load disputes', 'error');
        }
    }

    function renderList() {
        const container = document.getElementById('disputes-list');
        if (disputes.length === 0) {
            container.innerHTML = `
                <div class="empty">
                    <h3>No disputes yet</h3>
                    <p>If you have a project issue that can't be resolved,
                       you can raise a dispute.</p>
                </div>`;
            return;
        }

        container.innerHTML = disputes.map(d => `
            <div class="dispute-card" onclick="loadDetail(${d.id})">
                <div class="card-header">
                    <div>
                        <div class="card-title">${escHtml(d.reason)}</div>
                        <div class="card-project">
                            Project: ${escHtml(d.projectTitle)}
                        </div>
                    </div>
                    <span class="badge badge-${d.status.toLowerCase()}">
                        ${d.status.replace('_',' ')}
                    </span>
                </div>
                <div class="card-meta">
                    <div class="meta-item">
                        Reporter: <span>${escHtml(d.reporterName)}</span>
                    </div>
                    <div class="meta-item">
                        Respondent: <span>${escHtml(d.respondentName)}</span>
                    </div>
                    <div class="meta-item">
                        Filed: <span>${formatDate(d.createdAt)}</span>
                    </div>
                    ${d.resolvedAt
                        ? `<div class="meta-item">
                               Resolved: <span>${formatDate(d.resolvedAt)}</span>
                           </div>` : ''}
                </div>
            </div>
        `).join('');
    }

    async function loadDetail(id) {
        try {
            const res = await api.get(`/api/v1/disputes/${id}`);
            const d   = await res.json();
            renderDetail(d);
            document.getElementById('list-view').style.display   = 'none';
            document.getElementById('detail-view').style.display = 'block';
        } catch(e) {
            showToast('Failed to load dispute', 'error');
        }
    }

    function renderDetail(d) {
        const isReporter   = currentUser?.id === d.reporterId;
        const isRespondent = currentUser?.id === d.respondentId;
        const isAdmin      = currentUser?.role === 'ADMIN';
        const isOpen       = d.status === 'OPEN' || d.status === 'UNDER_REVIEW';

        const evidenceHtml = urls => urls && urls.length
            ? `<div class="evidence-list">
                   ${urls.map((u,i) =>
                       `<a class="evidence-link" href="${u}"
                           target="_blank">Evidence ${i+1}</a>`
                   ).join('')}
               </div>`
            : `<div style="font-size:0.82rem;color:var(--text3);">
                   No evidence provided
               </div>`;

        document.getElementById('detail-content').innerHTML = `
            <div class="detail-card">
                <div style="display:flex;align-items:flex-start;
                            justify-content:space-between;
                            margin-bottom:1.5rem;flex-wrap:wrap;gap:0.75rem;">
                    <div>
                        <h2 style="font-family:'Syne',sans-serif;font-weight:800;
                                   font-size:1.2rem;margin-bottom:0.3rem;">
                            ${escHtml(d.reason)}
                        </h2>
                        <div style="font-size:0.82rem;color:var(--text2);">
                            Project: <strong style="color:var(--text);">
                                ${escHtml(d.projectTitle)}
                            </strong>
                        </div>
                    </div>
                    <span class="badge badge-${d.status.toLowerCase()}"
                          style="font-size:0.8rem;padding:0.3rem 0.85rem;">
                        ${d.status.replace('_',' ')}
                    </span>
                </div>

                <div class="detail-section">
                    <div class="detail-label">Parties Involved</div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;
                                gap:0.75rem;">
                        <div style="background:var(--card2);border-radius:10px;
                                    padding:0.85rem;border:1px solid var(--border2);">
                            <div style="font-size:0.72rem;color:var(--text3);
                                        margin-bottom:0.25rem;">REPORTER</div>
                            <div style="font-weight:600;">
                                ${escHtml(d.reporterName)}
                            </div>
                        </div>
                        <div style="background:var(--card2);border-radius:10px;
                                    padding:0.85rem;border:1px solid var(--border2);">
                            <div style="font-size:0.72rem;color:var(--text3);
                                        margin-bottom:0.25rem;">RESPONDENT</div>
                            <div style="font-weight:600;">
                                ${escHtml(d.respondentName)}
                            </div>
                        </div>
                    </div>
                </div>

                <div class="detail-section">
                    <div class="detail-label">Description</div>
                    <div class="detail-text">${escHtml(d.description)}</div>
                </div>

                <div class="detail-section">
                    <div class="detail-label">Reporter's Evidence</div>
                    ${evidenceHtml(d.evidenceUrls)}
                </div>

                ${d.respondentReply ? `
                <div class="detail-section">
                    <div class="detail-label">Respondent's Reply</div>
                    <div class="detail-text">${escHtml(d.respondentReply)}</div>
                    <div style="margin-top:0.75rem;">
                        <div class="detail-label">Respondent's Evidence</div>
                        ${evidenceHtml(d.respondentEvidenceUrls)}
                    </div>
                </div>` : ''}

                ${d.status === 'RESOLVED' ? `
                <div class="resolution-box">
                    <div class="res-title">
                        Resolved — ${formatResolution(d.resolution)}
                    </div>
                    ${d.adminNotes ? `
                    <div style="font-size:0.85rem;color:var(--text2);
                                line-height:1.6;">
                        ${escHtml(d.adminNotes)}
                    </div>` : ''}
                    <div style="font-size:0.75rem;color:var(--text3);
                                margin-top:0.5rem;">
                        Resolved by ${escHtml(d.resolvedByName || 'Admin')}
                        on ${formatDate(d.resolvedAt)}
                    </div>
                </div>` : ''}
            </div>

            ${isRespondent && isOpen && !d.respondentReply ? `
            <div class="detail-card">
                <h3 style="font-family:'Syne',sans-serif;font-weight:700;
                           font-size:1rem;margin-bottom:1.25rem;
                           color:var(--gold);">Submit Your Reply</h3>
                <div class="form-group">
                    <label>Your Response</label>
                    <textarea id="reply-text" rows="4"
                        placeholder="Explain your side of the situation…"></textarea>
                </div>
                <div class="form-group">
                    <label>Evidence URLs (optional)</label>
                    <input type="text" id="reply-evidence"
                        placeholder="https://…, https://…">
                </div>
                <div class="btn-row">
                    <button class="btn-submit teal"
                            id="reply-btn"
                            onclick="submitReply(${d.id})">
                        Submit Reply
                    </button>
                </div>
            </div>` : ''}

            ${isAdmin && isOpen ? `
            <div class="detail-card">
                <h3 style="font-family:'Syne',sans-serif;font-weight:700;
                           font-size:1rem;margin-bottom:1.25rem;
                           color:var(--teal);">Admin Resolution</h3>
                <div class="form-group">
                    <label>Resolution</label>
                    <select id="admin-resolution">
                        <option value="">Select outcome…</option>
                        <option value="FAVOUR_REPORTER">
                            In favour of Reporter (${escHtml(d.reporterName)})
                        </option>
                        <option value="FAVOUR_RESPONDENT">
                            In favour of Respondent (${escHtml(d.respondentName)})
                        </option>
                        <option value="SPLIT">Split — both parties at fault</option>
                        <option value="NO_ACTION">No action required</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Admin Notes (visible to both parties)</label>
                    <textarea id="admin-notes" rows="3"
                        placeholder="Explain the resolution decision…"></textarea>
                </div>
                <div class="btn-row">
                    <button class="btn-submit"
                            id="resolve-btn"
                            onclick="resolveDispute(${d.id})">
                        Resolve Dispute
                    </button>
                </div>
            </div>` : ''}
        `;
    }

    function showList() {
        document.getElementById('list-view').style.display   = 'block';
        document.getElementById('detail-view').style.display = 'none';
        history.pushState({}, '', '/disputes.html');
    }

    // Raise dispute
    function openRaiseModal() {
        document.getElementById('raise-modal').style.display = 'flex';
    }
    function closeRaiseModal() {
        document.getElementById('raise-modal').style.display = 'none';
    }

    async function raiseDispute() {
        const projectId   = document.getElementById('f-projectId').value;
        const reason      = document.getElementById('f-reason').value.trim();
        const description = document.getElementById('f-description').value.trim();
        const evidenceUrls= document.getElementById('f-evidence').value.trim();

        if (!projectId || !reason || description.length < 20) {
            showToast('Please fill in all required fields', 'error');
            return;
        }

        const btn = document.getElementById('raise-btn');
        btn.disabled    = true;
        btn.textContent = 'Submitting…';

        try {
            const res = await api.post('/api/v1/disputes', {
                projectId: parseInt(projectId),
                reason, description, evidenceUrls
            });

            if (res.ok) {
                closeRaiseModal();
                showToast('Dispute raised successfully', 'success');
                loadDisputes();
            } else {
                const data = await res.json();
                showToast(data.message || 'Failed to raise dispute', 'error');
            }
        } catch(e) {
            showToast('Network error', 'error');
        } finally {
            btn.disabled    = false;
            btn.textContent = 'Submit Dispute';
        }
    }

    async function submitReply(disputeId) {
        const reply       = document.getElementById('reply-text').value.trim();
        const evidenceUrls= document.getElementById('reply-evidence').value.trim();
        if (!reply) { showToast('Reply cannot be empty', 'error'); return; }

        const btn = document.getElementById('reply-btn');
        btn.disabled = true; btn.textContent = 'Submitting…';

        try {
            const res = await api.post(
                `/api/v1/disputes/${disputeId}/reply`,
                { reply, evidenceUrls });

            if (res.ok) {
                showToast('Reply submitted', 'success');
                loadDetail(disputeId);
            } else {
                const data = await res.json();
                showToast(data.message || 'Failed', 'error');
                btn.disabled = false; btn.textContent = 'Submit Reply';
            }
        } catch(e) {
            showToast('Network error', 'error');
            btn.disabled = false; btn.textContent = 'Submit Reply';
        }
    }

    async function resolveDispute(disputeId) {
        const resolution = document.getElementById('admin-resolution').value;
        const adminNotes = document.getElementById('admin-notes').value.trim();
        if (!resolution) {
            showToast('Please select a resolution', 'error'); return;
        }

        const btn = document.getElementById('resolve-btn');
        btn.disabled = true; btn.textContent = 'Resolving…';

        try {
            const res = await api.post(
                `/api/v1/disputes/${disputeId}/resolve`,
                { resolution, adminNotes });

            if (res.ok) {
                showToast('Dispute resolved', 'success');
                loadDetail(disputeId);
            } else {
                const data = await res.json();
                showToast(data.message || 'Failed', 'error');
                btn.disabled = false; btn.textContent = 'Resolve Dispute';
            }
        } catch(e) {
            showToast('Network error', 'error');
            btn.disabled = false; btn.textContent = 'Resolve Dispute';
        }
    }

    function formatResolution(r) {
        const map = {
            FAVOUR_REPORTER:   'In favour of reporter',
            FAVOUR_RESPONDENT: 'In favour of respondent',
            SPLIT:             'Split decision',
            NO_ACTION:         'No action taken'
        };
        return map[r] || r;
    }

    function formatDate(iso) {
        if (!iso) return '—';
        return new Date(iso).toLocaleDateString([], {
            year:'numeric', month:'short', day:'numeric'});
    }

    function escHtml(s) {
        if (!s) return '';
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;')
                .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function showToast(msg, type='success') {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className   = `toast ${type} show`;
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    init();
</script>
</body>
</html>
