<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%2300C9A7'/%3E%3Cstop offset='100%25' stop-color='%23F5A623'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='8' fill='url(%23g)'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-family='Arial Black,sans-serif' font-weight='900' font-size='14' fill='white'%3ESB%3C/text%3E%3C/svg%3E">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Workspace — SkillBridge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
        :root {
          --bg:#060D1A; --bg2:#0B1425; --card:#0D1829; --card2:#111f38;
          --teal:#00C9A7; --teal-dk:#00A389; --gold:#F5A623; --purple:#7B61FF;
          --rose:#FF6B8A; --text:#E8F0FE; --text2:#8BA3C7; --text3:#4A6080;
          --border:#1A2D4A; --border2:#243650;
        }
        body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; }
        nav {
          display:flex; align-items:center; justify-content:space-between;
          padding:0 5%; height:64px; background:rgba(6,13,26,0.95);
          border-bottom:1px solid var(--border); position:sticky; top:0; z-index:50; flex-shrink:0;
        }
        .nav-logo { font-family:'Syne',sans-serif; font-weight:800; font-size:1.35rem;
          background:linear-gradient(135deg,var(--teal),var(--gold));
          -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .nav-links { display:flex; gap:1.5rem; align-items:center; }
        .nav-links a { font-size:0.88rem; color:var(--text2); text-decoration:none; transition:color 0.2s; }
        .nav-links a:hover { color:var(--teal); }
        .user-av {
          width:36px; height:36px; border-radius:50%;
          background:linear-gradient(135deg,var(--gold),var(--rose));
          display:flex; align-items:center; justify-content:center;
          font-weight:700; font-size:0.85rem; color:#fff;
        }
        .btn-sm { padding:0.4rem 1rem; border-radius:8px; font-size:0.85rem; font-weight:600; cursor:pointer; font-family:'DM Sans',sans-serif; }
        .btn-logout { background:transparent; border:1px solid var(--border2); color:var(--text2); transition:all 0.2s; }
        .btn-logout:hover { border-color:var(--rose); color:var(--rose); }

        .workspace {
          display:grid; grid-template-columns:300px 1fr;
          flex:1; overflow:hidden; height:calc(100vh - 64px);
        }
        @media(max-width:768px) { .workspace { grid-template-columns:1fr; } }

        /* Sidebar */
        .sidebar {
          background:var(--bg2); border-right:1px solid var(--border);
          display:flex; flex-direction:column; overflow:hidden;
        }
        .sidebar-header { padding:1.25rem; border-bottom:1px solid var(--border); }
        .sidebar-header h2 { font-family:'Syne',sans-serif; font-weight:700; font-size:1rem; margin-bottom:0.75rem; }
        .project-status {
          display:inline-flex; align-items:center; gap:0.4rem;
          padding:0.3rem 0.85rem; border-radius:99px; font-size:0.75rem; font-weight:700;
        }
        .status-active    { background:rgba(0,201,167,0.1); color:var(--teal); border:1px solid rgba(0,201,167,0.2); }
        .status-completed { background:rgba(245,166,35,0.1); color:var(--gold); border:1px solid rgba(245,166,35,0.2); }
        .status-cancelled { background:rgba(255,107,138,0.1); color:var(--rose); border:1px solid rgba(255,107,138,0.2); }
        .info-block { padding:1.25rem; border-bottom:1px solid var(--border); }
        .info-label { font-size:0.75rem; color:var(--text3); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:0.35rem; }
        .info-value { font-size:0.9rem; color:var(--text); font-weight:600; }
        .info-subvalue { font-size:0.8rem; color:var(--text2); margin-top:0.15rem; }
        .party-row { display:flex; align-items:center; gap:0.75rem; padding:1rem 1.25rem; border-bottom:1px solid var(--border); }
        .party-av {
          width:38px; height:38px; border-radius:50%; flex-shrink:0;
          background:linear-gradient(135deg,var(--purple),var(--teal));
          display:flex; align-items:center; justify-content:center;
          font-weight:700; color:#fff; font-size:0.9rem;
        }
        .party-role { font-size:0.72rem; color:var(--text3); }
        .party-name { font-size:0.9rem; font-weight:600; }
        .online-dot {
          width:8px; height:8px; border-radius:50%; background:var(--teal);
          box-shadow:0 0 6px var(--teal); flex-shrink:0;
        }
        .sidebar-actions { padding:1.25rem; margin-top:auto; display:flex; flex-direction:column; gap:0.5rem; }
        .btn-complete {
          padding:0.7rem 1rem; border-radius:10px; font-size:0.85rem; font-weight:700;
          cursor:pointer; font-family:'DM Sans',sans-serif; border:none;
          background:linear-gradient(135deg,var(--teal),var(--teal-dk)); color:#000;
          transition:opacity 0.2s;
        }
        .btn-complete:hover { opacity:0.85; }
        .btn-complete:disabled { opacity:0.4; cursor:not-allowed; }
        .btn-cancel-project {
          padding:0.7rem 1rem; border-radius:10px; font-size:0.85rem; font-weight:700;
          cursor:pointer; font-family:'DM Sans',sans-serif;
          background:transparent; border:1px solid var(--rose); color:var(--rose);
          transition:all 0.2s;
        }
        .btn-cancel-project:hover { background:rgba(255,107,138,0.08); }
        .back-link-sidebar {
          display:flex; align-items:center; gap:0.4rem; color:var(--text2);
          text-decoration:none; font-size:0.82rem; padding:0.75rem 1.25rem;
          border-bottom:1px solid var(--border); transition:color 0.2s;
        }
        .back-link-sidebar:hover { color:var(--teal); }

        /* Chat area */
        .chat-area { display:flex; flex-direction:column; overflow:hidden; }
        .chat-header {
          padding:1rem 1.5rem; border-bottom:1px solid var(--border);
          background:var(--card); display:flex; align-items:center; justify-content:space-between;
        }
        .chat-header h3 { font-family:'Syne',sans-serif; font-weight:700; font-size:1rem; }
        .ws-status { display:flex; align-items:center; gap:0.4rem; font-size:0.78rem; color:var(--text3); }
        .ws-dot { width:7px; height:7px; border-radius:50%; background:var(--text3); transition:background 0.3s; }
        .ws-dot.connected { background:var(--teal); box-shadow:0 0 5px var(--teal); }

        .messages-area { flex:1; overflow-y:auto; padding:1.5rem; display:flex; flex-direction:column; gap:0.75rem; }
        .messages-area::-webkit-scrollbar { width:5px; }
        .messages-area::-webkit-scrollbar-track { background:transparent; }
        .messages-area::-webkit-scrollbar-thumb { background:var(--border2); border-radius:99px; }

        .msg-row { display:flex; align-items:flex-end; gap:0.6rem; max-width:100%; }
.msg-row.mine { flex-direction:row-reverse; }
.msg-row > div { max-width:70%; }
        .msg-avatar {
          width:30px; height:30px; border-radius:50%; flex-shrink:0;
          background:linear-gradient(135deg,var(--purple),var(--teal));
          display:flex; align-items:center; justify-content:center;
          font-size:0.72rem; font-weight:700; color:#fff;
        }
        .msg-row.mine .msg-avatar { background:linear-gradient(135deg,var(--gold),var(--rose)); }
        /* REPLACE WITH */
.msg-bubble {
    max-width:70%; min-width:60px; padding:0.75rem 1rem; border-radius:16px;
    font-size:0.88rem; line-height:1.5; word-break:break-word;
    display:inline-block;
}
        .msg-row:not(.mine) .msg-bubble {
          background:var(--card2); border:1px solid var(--border2); border-bottom-left-radius:4px;
        }
        .msg-row.mine .msg-bubble {
          background:linear-gradient(135deg,rgba(0,201,167,0.15),rgba(0,163,137,0.15));
          border:1px solid rgba(0,201,167,0.2); border-bottom-right-radius:4px; color:var(--text);
        }
        .msg-time { font-size:0.7rem; color:var(--text3); margin-top:0.3rem; text-align:right; }
        .msg-row:not(.mine) .msg-time { text-align:left; }
        .msg-name { font-size:0.72rem; color:var(--text3); margin-bottom:0.2rem; }

        .date-divider {
          text-align:center; font-size:0.75rem; color:var(--text3);
          padding:0.5rem 0; position:relative;
        }
        .date-divider::before {
          content:''; position:absolute; top:50%; left:0; right:0;
          height:1px; background:var(--border); z-index:0;
        }
        .date-divider span {
          position:relative; z-index:1; background:var(--bg); padding:0 0.75rem;
        }

        /* Input area */
        .chat-input-area {
          padding:1rem 1.5rem; border-top:1px solid var(--border); background:var(--card);
          display:flex; gap:0.75rem; align-items:flex-end;
        }
        .chat-input {
          flex:1; background:var(--bg2); border:1px solid var(--border2); border-radius:12px;
          padding:0.75rem 1rem; color:var(--text); font-family:'DM Sans',sans-serif;
          font-size:0.9rem; outline:none; resize:none; max-height:120px;
          transition:border-color 0.2s; line-height:1.5;
        }
        .chat-input:focus { border-color:var(--teal); }
        .chat-input::placeholder { color:var(--text3); }
        .btn-send {
          width:44px; height:44px; border-radius:12px; border:none; cursor:pointer;
          background:linear-gradient(135deg,var(--teal),var(--teal-dk)); color:#000;
          display:flex; align-items:center; justify-content:center; flex-shrink:0;
          transition:opacity 0.2s;
        }
        .btn-send:hover { opacity:0.85; }
        .btn-send:disabled { opacity:0.4; cursor:not-allowed; }

        .empty-chat { text-align:center; margin:auto; color:var(--text3); padding:2rem; }
.empty-chat svg { width:48px; height:48px; margin:0 auto 0.75rem; display:block; opacity:0.25; }
        .typing-indicator { display:none; font-size:0.78rem; color:var(--text3); padding:0 1.5rem 0.5rem; font-style:italic; }


        .modal-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:100;
    display:none; align-items:center; justify-content:center; padding:1rem;
}
.modal-overlay.open { display:flex; }
.modal {
    background:var(--card); border:1px solid var(--border2); border-radius:20px;
    padding:2rem; width:100%; max-width:480px;
}

.star-btn { background:none; border:none; cursor:pointer; padding:0; color:var(--text3); transition:transform 0.1s; }
.star-btn:hover { transform:scale(1.15); }
.star-btn svg { transition:fill 0.15s, stroke 0.15s; }

.back-link-sidebar::before {
    content: '';
    display: inline-block;
    width: 5px; height: 5px;
    border-left: 2px solid currentColor;
    border-bottom: 2px solid currentColor;
    transform: rotate(45deg) translateY(-1px);
    flex-shrink: 0;
}
.modal h2 { font-family:'Syne',sans-serif; font-weight:800; font-size:1.25rem; margin-bottom:0.35rem; }

        /* Sidebar project title gradient */
.sidebar-header h2 {
    background: linear-gradient(135deg, var(--text), var(--text2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* Sidebar info block hover */
.info-block {
    transition: background 0.15s;
}
.info-block:hover {
    background: rgba(255,255,255,0.02);
}

/* Party row hover */
.party-row {
    transition: background 0.15s;
}
.party-row:hover {
    background: rgba(255,255,255,0.02);
}

/* Online dot pulse on party row */
.online-dot {
    animation: dot-pulse 2s ease-in-out infinite;
}
@keyframes dot-pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50%      { opacity:0.5; transform:scale(1.3); }
}

/* Message bubble entrance */
.msg-row {
    animation: msgIn 0.2s ease both;
}
@keyframes msgIn {
    from { opacity:0; transform:translateY(6px); }
    to   { opacity:1; transform:none; }
}

/* Mine bubble slightly warmer */
.msg-row.mine .msg-bubble {
    box-shadow: 0 2px 8px rgba(0,201,167,0.08);
}

/* Chat input focus glow */
.chat-input:focus {
    box-shadow: 0 0 0 3px rgba(0,201,167,0.1);
}

/* Send button glow */
.btn-send:not(:disabled) {
    box-shadow: 0 2px 12px rgba(0,201,167,0.25);
}

/* ws-status connected text color */
.ws-dot.connected + span {
    color: var(--teal);
}

/* Complete button glow */
@keyframes glow-pulse {
    0%,100% { box-shadow: 0 4px 20px rgba(0,201,167,0.3); }
    50%      { box-shadow: 0 4px 28px rgba(0,201,167,0.5); }
}
.btn-complete:not(:disabled) {
    animation: glow-pulse 2.5s ease-in-out infinite;
}

/* Modal entrance */
.modal-overlay.open .modal {
    animation: modalIn 0.3s cubic-bezier(0.22,1,0.36,1);
}
@keyframes modalIn {
    from { opacity:0; transform:scale(0.95) translateY(10px); }
    to   { opacity:1; transform:none; }
}

/* Modal border top accent */
.modal {
    border-top: 2px solid rgba(0,201,167,0.3);
}

/* Scrollbar for messages */
.messages-area::-webkit-scrollbar-thumb:hover {
    background: var(--border);
}

/* Status badge pulse for active */
.status-active {
    animation: dot-pulse 3s ease-in-out infinite;
}
    </style>
</head>
<body>
<nav>
    <a href="/" class="nav-logo">SkillBridge</a>
    <div class="nav-links">
        <a href="#" id="dashboard-link">Dashboard</a>
        <a href="#" id="projects-link">My Projects</a>
    </div>
    <div style="display:flex;align-items:center;gap:0.75rem;">
        <div class="user-av" id="user-av">?</div>
        <button class="btn-sm btn-logout" onclick="logout()">Logout</button>
    </div>
</nav>

<div class="workspace">
    <!-- Sidebar -->
    <div class="sidebar">
        <a href="#" id="back-link" class="back-link-sidebar">Back</a>

        <div class="sidebar-header">
            <h2 id="project-title">Loading...</h2>
            <span class="project-status status-active" id="project-status-badge">ACTIVE</span>
        </div>

        <!-- Job info -->
        <div class="info-block">
            <div class="info-label">Job</div>
            <div class="info-value" id="job-title">—</div>
            <div class="info-subvalue" id="project-budget">—</div>
        </div>

        <!-- Rate -->
        <div class="info-block">
            <div class="info-label">Agreed Rate</div>
            <div class="info-value" id="agreed-rate">—</div>
        </div>

        <!-- Client -->
        <div class="party-row">
            <div class="party-av" id="client-av">C</div>
            <div>
                <div class="party-role">Client</div>
                <div class="party-name" id="client-name">—</div>
            </div>
        </div>

        <!-- Freelancer -->
        <div class="party-row">
            <div class="party-av" id="freelancer-av">F</div>
            <div>
                <div class="party-role">Freelancer</div>
                <div class="party-name" id="freelancer-name">—</div>
            </div>
        </div>

        <!-- Started -->
        <div class="info-block">
            <div class="info-label">Started</div>
            <div class="info-value" id="started-date">—</div>
        </div>

        <!-- Actions -->
        <div class="sidebar-actions" id="sidebar-actions"></div>
    </div>

    <!-- Chat Area -->
    <div class="chat-area">
        <div class="chat-header">
            <h3>Project Chat</h3>
            <div class="ws-status">
                <div class="ws-dot" id="ws-dot"></div>
                <span id="ws-status-text">Connecting...</span>
            </div>
        </div>

        <div class="messages-area" id="messages-area">
            <div class="empty-chat">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                </svg>
                <p>Loading messages...</p>
            </div>
        </div>

        <div class="typing-indicator" id="typing-indicator">...</div>

        <div class="chat-input-area">
            <textarea class="chat-input" id="chat-input"
                      placeholder="Type a message… (Enter to send, Shift+Enter for new line)"
                      rows="1"
                      onkeydown="handleInputKey(event)"
                      oninput="autoResize(this)"></textarea>
            <button class="btn-send" id="send-btn" onclick="sendMessage()" title="Send">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <line x1="22" y1="2" x2="11" y2="13"/>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
            </button>
        </div>
    </div>
</div>

<script src="/js/utils.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script>
    requireAuth();

    const projectId = new URLSearchParams(window.location.search).get('id');
    if (!projectId) window.location.replace('/dashboard-freelancer.html');

    let stompClient  = null;
    let currentUser  = null;
    let projectData  = null;
    let isConnected  = false;

    async function init() {
        try {
            const [profileRes, projectRes] = await Promise.all([
                api.get('/api/v1/profile'),
                api.get(`/api/v1/projects/${projectId}`)
            ]);

            currentUser = await profileRes.json();
            projectData = await projectRes.json();

            document.getElementById('user-av').textContent = (currentUser.name||'?')[0].toUpperCase();

            // Set dashboard link based on role
            const role = localStorage.getItem('sb_role');
            const dashLink = role === 'CLIENT' ? '/dashboard-client.html' : '/dashboard-freelancer.html';
            document.getElementById('dashboard-link').href = dashLink;
            document.getElementById('projects-link').href  = '/my-projects.html';
            document.getElementById('back-link').href      = dashLink;

            renderProjectInfo(projectData);
            await loadMessages();
            connectWebSocket();

        } catch(e) {
            console.error('Init failed:', e);
        }
    }

    function renderProjectInfo(p) {
        document.title = `${p.title} — SkillBridge`;
        document.getElementById('project-title').textContent  = p.title;
        document.getElementById('job-title').textContent      = p.jobTitle || '—';
        document.getElementById('project-budget').textContent = p.budget ? `Budget: $${Number(p.budget).toLocaleString()}` : '';
        document.getElementById('agreed-rate').textContent    = p.acceptedRate ? `$${p.acceptedRate}/hr` : '—';
        document.getElementById('client-name').textContent    = p.clientName || '—';
        document.getElementById('freelancer-name').textContent= p.freelancerName || '—';
        document.getElementById('freelancer-name-modal').textContent = p.freelancerName || 'the freelancer';
        document.getElementById('client-av').textContent      = (p.clientName||'C')[0].toUpperCase();
        document.getElementById('freelancer-av').textContent  = (p.freelancerName||'F')[0].toUpperCase();
        document.getElementById('started-date').textContent   = formatDate(p.createdAt);

        // Status badge
        const badge = document.getElementById('project-status-badge');
        badge.textContent = p.status;
        badge.className   = 'project-status status-' + (p.status||'active').toLowerCase();

        // Actions — only show if ACTIVE
        const actionsEl = document.getElementById('sidebar-actions');
        const role = localStorage.getItem('sb_role');
        // REPLACE WITH
if (p.status === 'ACTIVE') {
    actionsEl.innerHTML = `
        <button class="btn-complete" onclick="updateStatus('COMPLETED')">
            Mark as Completed
        </button>
        ${role === 'CLIENT' ? `
        <button class="btn-cancel-project" onclick="updateStatus('CANCELLED')">
            Cancel Project
        </button>` : ''}`;
} else if (p.status === 'COMPLETED') {
    if (role === 'CLIENT') {
        // Check if already reviewed
        checkReviewStatus(p.id);
    } else {
        actionsEl.innerHTML = `<p style="font-size:0.82rem;color:var(--teal);text-align:center;">
            Project completed</p>`;
    }
} else {
    actionsEl.innerHTML = `<p style="font-size:0.82rem;color:var(--text3);text-align:center;">
        Project is ${p.status.toLowerCase()}</p>`;
}
    }

    async function loadMessages() {
        try {
            const res      = await api.get(`/api/v1/projects/${projectId}/messages`);
            const messages = await res.json();
            renderMessages(messages);
        } catch(e) {
            console.error('Failed to load messages:', e);
        }
    }

    function renderMessages(messages) {
        const area = document.getElementById('messages-area');

        if (!messages || messages.length === 0) {
            area.innerHTML = `
    <div class="empty-chat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <p>No messages yet.</p>
                    <p style="margin-top:0.5rem;font-size:0.82rem;">Send a message to get started!</p>
                </div>`;
            return;
        }

        let html = '';
        let lastDate = '';

        messages.forEach(m => {
            const msgDate = new Date(m.createdAt).toLocaleDateString();
            if (msgDate !== lastDate) {
                html += `<div class="date-divider"><span>${msgDate}</span></div>`;
                lastDate = msgDate;
            }

            const initials = (m.senderName||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
            const timeStr  = new Date(m.createdAt).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});

            html += `
            <div class="msg-row${m.mine ? ' mine' : ''}">
                <div class="msg-avatar">${initials}</div>
                <div>
                    ${!m.mine ? `<div class="msg-name">${escHtml(m.senderName||'')}</div>` : ''}
                    <div class="msg-bubble">${escHtml(m.content)}</div>
                    <div class="msg-time">${timeStr}${m.mine && m.isRead ? ' Seen' : ''}</div>
                </div>
            </div>`;
        });

        area.innerHTML = html;
        scrollToBottom();
    }

    function appendMessage(m) {
        const area = document.getElementById('messages-area');

        // Remove empty state
        const empty = area.querySelector('.empty-chat');
        if (empty) empty.remove();

        const initials = (m.senderName||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
        const timeStr  = new Date(m.createdAt).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});

        const div = document.createElement('div');
        div.className = 'msg-row' + (m.mine ? ' mine' : '');
        div.innerHTML = `
            <div class="msg-avatar">${initials}</div>
            <div>
                ${!m.mine ? `<div class="msg-name">${escHtml(m.senderName||'')}</div>` : ''}
                <div class="msg-bubble">${escHtml(m.content)}</div>
                <div class="msg-time">${timeStr}</div>
            </div>`;

        area.appendChild(div);
        scrollToBottom();
    }

    function scrollToBottom() {
        const area = document.getElementById('messages-area');
        area.scrollTop = area.scrollHeight;
    }

    // ── WebSocket ─────────────────────────────────────────────────────────
    function connectWebSocket() {
        const token = localStorage.getItem('sb_jwt');
        if (!token) return;

        try {
            const socket = new SockJS('/ws');
            stompClient  = Stomp.over(socket);
            stompClient.debug = null; // Suppress debug logs

            stompClient.connect(
                { Authorization: 'Bearer ' + token },
                () => {
                    isConnected = true;
                    setWsStatus(true);

                    // Subscribe to project chat room
                    stompClient.subscribe(`/topic/project.${projectId}`, (msg) => {
    const message = JSON.parse(msg.body);
    // Recalculate mine using senderId — server's mine field is from sender's POV
    message.mine = (message.senderId === currentUser.id);
    // Skip our own (already shown optimistically)
    if (message.senderId !== currentUser.id) {
        appendMessage(message);
    }
});
                },
                (error) => {
                    isConnected = false;
                    setWsStatus(false);
                    // Retry after 3 seconds
                    setTimeout(connectWebSocket, 3000);
                }
            );
        } catch(e) {
            setWsStatus(false);
        }
    }

    function setWsStatus(connected) {
        const dot  = document.getElementById('ws-dot');
        const text = document.getElementById('ws-status-text');
        dot.className  = 'ws-dot' + (connected ? ' connected' : '');
        text.textContent = connected ? 'Connected' : 'Reconnecting...';
    }

    // ── Send message ──────────────────────────────────────────────────────
    async function sendMessage() {
        const input   = document.getElementById('chat-input');
        const content = input.value.trim();
        if (!content) return;

        input.value = '';
        autoResize(input);

        // Optimistic UI — show message immediately
        const optimistic = {
            content,
            mine: true,
            senderName: currentUser?.name || 'You',
            createdAt: new Date().toISOString(),
            isRead: false
        };
        appendMessage(optimistic);

        try {
            if (isConnected && stompClient) {
                // Send via WebSocket
                stompClient.send(
                    `/app/chat.${projectId}`,
                    {},
                    JSON.stringify({ content })
                );
            } else {
                // Fallback to REST
                await api.post(`/api/v1/projects/${projectId}/messages`, { content });
            }
        } catch(e) {
            console.error('Send failed:', e);
        }
    }

    function handleInputKey(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    }

    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    async function updateStatus(status) {
        const label = status === 'COMPLETED' ? 'complete' : 'cancel';
        if (!confirm(`Are you sure you want to ${label} this project?`)) return;

        try {
            const res = await api.patch(`/api/v1/projects/${projectId}/status`, { status });
            if (res.ok) {
                window.location.reload();
            }
        } catch(e) {
            alert('Failed to update project status.');
        }
    }


    async function checkReviewStatus(projectId) {
    const actionsEl = document.getElementById('sidebar-actions');
    try {
        const res = await api.get(`/api/v1/reviews/project/${projectId}`);
        if (res.status === 204) {
            // No review yet — show button
            actionsEl.innerHTML = `
                <p style="font-size:0.82rem;color:var(--teal);text-align:center;margin-bottom:0.75rem;">
                    Project completed</p>
                <button class="btn-complete" onclick="openReviewModal()">
                    Leave a Review
                </button>`;
        } else {
            const review = await res.json();
            actionsEl.innerHTML = `
                <p style="font-size:0.82rem;color:var(--teal);text-align:center;">
                    Project completed</p>
                <p style="font-size:0.82rem;color:var(--text3);text-align:center;margin-top:0.5rem;">
                    You rated this project ${review.rating}/5</p>`
        }
    } catch(e) {
        actionsEl.innerHTML = `<p style="font-size:0.82rem;color:var(--teal);text-align:center;">Project completed</p>`;
    }
}

function openReviewModal() {
    document.getElementById('review-modal').classList.add('open');
}

function closeReviewModal() {
    document.getElementById('review-modal').classList.remove('open');
}

let selectedRating = 0;

function setRating(val) {
    selectedRating = val;
    document.querySelectorAll('.star-btn svg').forEach((svg, i) => {
        svg.style.fill   = i < val ? 'var(--gold)' : 'none';
        svg.style.stroke = i < val ? 'var(--gold)' : 'currentColor';
    });
    document.getElementById('review-rating-error').style.display = 'none';
}

async function submitReview() {
    if (selectedRating === 0) {
        document.getElementById('review-rating-error').style.display = 'block';
        return;
    }
    const comment = document.getElementById('review-comment').value.trim();
    const btn = document.getElementById('submit-review-btn');
    btn.disabled = true;
    btn.textContent = 'Submitting…';

    try {
        const res  = await api.post('/api/v1/reviews', {
            projectId: Number(projectId),
            rating: selectedRating,
            comment: comment || null
        });
        if (res.ok) {
            closeReviewModal();
            checkReviewStatus(projectId);
        } else {
            const data = await res.json();
            alert(data.message || 'Failed to submit review.');
            btn.disabled = false;
            btn.textContent = 'Submit Review';
        }
    } catch(e) {
        alert('Network error. Please try again.');
        btn.disabled = false;
        btn.textContent = 'Submit Review';
    }
}

    init();
</script>

<!-- Review Modal -->

                <button class="star-btn" onclick="setRating(3)"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></button>
                <button class="star-btn" onclick="setRating(4)"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></button>
                <button class="star-btn" onclick="setRating(5)"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></button>

            </div>

        <div style="margin-bottom:1.5rem;">
            <label style="display:block;font-size:0.85rem;font-weight:600;color:var(--text2);margin-bottom:0.4rem;">
                Comment (optional)
            </label>
            <textarea id="review-comment" placeholder="Share your experience working with this freelancer..."
                      style="width:100%;padding:0.75rem 1rem;border-radius:10px;background:var(--bg2);

                      maxlength="1000"></textarea>
        </div>

        <div style="display:flex;gap:0.75rem;">
            <button onclick="closeReviewModal()"
                    style="padding:0.85rem 1.25rem;border-radius:12px;font-size:0.88rem;font-weight:600;
                           cursor:pointer;font-family:'DM Sans',sans-serif;
                           background:transparent;border:1px solid var(--border2);color:var(--text2);">
                Cancel
            </button>
            <button id="submit-review-btn" onclick="submitReview()"
                    style="flex:1;padding:0.85rem;border-radius:12px;font-size:0.9rem;font-weight:700;
                           cursor:pointer;font-family:'DM Sans',sans-serif;border:none;
                           background:linear-gradient(135deg,var(--teal),var(--teal-dk));color:#000;">

            </button>
        </div>
    </div>
</div>
