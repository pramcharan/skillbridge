<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%2300C9A7'/%3E%3Cstop offset='100%25' stop-color='%23F5A623'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='8' fill='url(%23g)'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-family='Arial Black,sans-serif' font-weight='900' font-size='14' fill='white'%3ESB%3C/text%3E%3C/svg%3E">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Dashboard — SkillBridge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
        :root {
          --bg:#060D1A; --bg2:#0B1425; --card:#0D1829; --card2:#111f38;
          --teal:#00C9A7; --teal-dk:#00A389; --gold:#F5A623; --purple:#7B61FF;
          --rose:#FF6B8A; --text:#E8F0FE; --text2:#8BA3C7; --text3:#4A6080;
          --border:#1A2D4A; --border2:#243650;
        }
        body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
        nav {
          display:flex; align-items:center; justify-content:space-between;
          padding:0 5%; height:64px; background:rgba(6,13,26,0.95);
          border-bottom:1px solid var(--border); position:sticky; top:0; z-index:50;
        }
        .nav-logo { font-family:'Syne',sans-serif; font-weight:800; font-size:1.35rem;
          background:linear-gradient(135deg,var(--teal),var(--gold));
          -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .nav-links { display:flex; gap:1.5rem; align-items:center; }
        .nav-links a { font-size:0.88rem; color:var(--text2); text-decoration:none; transition:color 0.2s; }
        .nav-links a:hover { color:var(--teal); }
        .user-av {
          width:36px; height:36px; border-radius:50%;
          background:linear-gradient(135deg,var(--gold),var(--rose));
          display:flex; align-items:center; justify-content:center;
          font-weight:700; font-size:0.85rem; color:#fff;
        }
        .btn-sm { padding:0.4rem 1rem; border-radius:8px; font-size:0.85rem; font-weight:600; cursor:pointer; font-family:'DM Sans',sans-serif; }
        .btn-logout { background:transparent; border:1px solid var(--border2); color:var(--text2); transition:all 0.2s; }
        .btn-logout:hover { border-color:var(--rose); color:var(--rose); }
.btn-primary { background:linear-gradient(135deg,var(--teal),var(--teal-dk)); border:none; color:#000; }
        main { max-width:1200px; margin:0 auto; padding:2rem 5%; }
        .welcome-banner {
          background:linear-gradient(135deg,var(--card),var(--card2));
          border:1px solid var(--border2); border-radius:16px;
          padding:2rem; margin-bottom:2rem;
          display:flex; align-items:center; justify-content:space-between;
        }
        .wb-left h1 { font-family:'Syne',sans-serif; font-weight:800; font-size:1.6rem; margin-bottom:0.35rem; }
        .wb-left p { color:var(--text2); font-size:0.9rem; }
        .stats-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:1rem; margin-bottom:2rem; }
        .section-hdr h2 { font-family:'Syne',sans-serif; font-weight:700; font-size:1.1rem; }
        .job-list { display:flex; flex-direction:column; gap:0.75rem; }
        .job-row {
  background:var(--card); border:1px solid var(--border2); border-radius:12px;
  padding:1rem 1.25rem; display:flex; align-items:center; justify-content:space-between; gap:1rem;
  transition:border-color 0.2s, transform 0.15s;
}
.job-row:hover { border-color:var(--teal); transform:translateX(3px); }
        .jr-title { font-weight:700; font-size:0.95rem; }
        .jr-meta { font-size:0.8rem; color:var(--text2); margin-top:0.2rem; }
        .jr-status {
          padding:0.25rem 0.7rem; border-radius:99px; font-size:0.75rem; font-weight:700;
        }
        .status-open     { background:rgba(0,201,167,0.1); color:var(--teal); border:1px solid rgba(0,201,167,0.2); }
        .status-closed   { background:rgba(100,116,139,0.1); color:var(--text3); border:1px solid var(--border2); }
        .status-expired  { background:rgba(220,38,38,0.1); color:var(--rose); border:1px solid rgba(220,38,38,0.2); }
        .jr-actions { display:flex; gap:0.5rem; }
        .btn-xs {
          padding:0.3rem 0.8rem; border-radius:8px; font-size:0.8rem; font-weight:600;
          cursor:pointer; font-family:'DM Sans',sans-serif; text-decoration:none; transition:all 0.2s;
        }
        .btn-view { background:var(--card2); border:1px solid var(--border2); color:var(--text2); }
        .btn-view:hover { border-color:var(--teal); color:var(--teal); }
        .empty-state { text-align:center; padding:3rem; color:var(--text3); }
        /* ADD to existing styles */
.stat-card { background:var(--card); border:1px solid var(--border2); border-radius:14px; padding:1.25rem; text-align:center; transition:transform 0.2s; }
.stat-card:hover { transform:translateY(-2px); }
        /* ADD */
.section-hdr {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:1rem; padding-bottom:0.75rem;
  border-bottom:1px solid var(--border);
}
    </style>
</head>
<body>
<nav>
    <a href="/" class="nav-logo">SkillBridge</a>
    <div class="nav-links">
        <a href="/post-job.html">Post a Job</a>
        <a href="/my-projects.html">My Projects</a>
        <a href="/profile.html">Profile</a>
    </div>
    <div style="display:flex;align-items:center;gap:0.75rem;">
        <!-- Notification bell -->
        <div style="position:relative;cursor:pointer;width:36px;height:36px;border-radius:10px;
     background:var(--card);border:1px solid var(--border2);display:flex;
     align-items:center;justify-content:center;transition:all 0.2s;"
             onclick="openNotifications()"
             onmouseover="this.style.borderColor='var(--teal)'"
             onmouseout="this.style.borderColor='var(--border2)'">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                 stroke="var(--text2)" stroke-width="2">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
            </svg>
            <span id="notif-badge" style="
            display:none;position:absolute;top:-4px;right:-4px;
            background:var(--rose);color:#fff;border-radius:99px;
            font-size:0.65rem;font-weight:700;padding:0.1rem 0.35rem;
            min-width:16px;text-align:center;">0</span>
        </div>
        <div class="user-av" id="user-av">?</div>
        <button class="btn-sm btn-logout" onclick="logout()">Logout</button>
    </div>
</nav>

<main>
    <div class="welcome-banner" style="position:relative;overflow:hidden;">
        <!-- Background decoration -->
        <div style="position:absolute;right:-20px;top:-20px;width:180px;height:180px;
        border-radius:50%;background:radial-gradient(circle,rgba(0,201,167,0.06),transparent);
        pointer-events:none;"></div>
        <div class="wb-left">
            <h1>Welcome back, <span id="user-name">...</span>!</h1>
            <p>Manage your jobs and find the best talent with AI matching.</p>
            <div style="display:flex;gap:0.75rem;margin-top:1.25rem;">
                <a href="/post-job.html" class="btn-sm btn-primary"
                   style="text-decoration:none;display:inline-flex;align-items:center;gap:0.4rem;color:#000;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Post a Job
                </a>
                <a href="/my-projects.html" class="btn-sm"
                   style="text-decoration:none;display:inline-flex;align-items:center;gap:0.4rem;
               background:transparent;border:1px solid var(--border2);color:var(--text2);">
                    View Projects
                </a>
            </div>
        </div>
        <svg width="120" height="120" viewBox="0 0 120 120" fill="none"
             style="opacity:0.04;flex-shrink:0;display:block;" aria-hidden="true">
            <circle cx="60" cy="60" r="55" stroke="var(--teal)" stroke-width="2"/>
            <circle cx="60" cy="60" r="35" stroke="var(--gold)" stroke-width="2"/>
            <circle cx="60" cy="60" r="15" stroke="var(--teal)" stroke-width="2"/>
        </svg>
    </div>

    <div class="stats-row">
        <div class="stat-card">
            <div class="num" id="stat-jobs">0</div>
            <div class="lbl">Jobs Posted</div>
        </div>
        <div class="stat-card">
            <div class="num" id="stat-proposals">0</div>
            <div class="lbl">Total Proposals</div>
        </div>
        <div class="stat-card">
            <div class="num" id="stat-active">0</div>
            <div class="lbl">Active Projects</div>
        </div>
        <div class="stat-card">
            <div class="num" id="stat-completed">0</div>
            <div class="lbl">Completed</div>
        </div>
    </div>

    <div class="section-hdr">
        <h2>Your Posted Jobs</h2>
        <a href="/post-job.html" style="color:var(--teal);text-decoration:none;font-size:0.85rem;">+ Post new job →</a>
    </div>
    <div class="job-list" id="job-list">
        <div class="empty-state">
            <div class="empty-icon">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity:0.3"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            </div>
            <p>Loading your jobs…</p>
        </div>
    </div>
</main>

<script src="/js/utils.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script>
    requireAuth('CLIENT');

    async function loadDashboard() {
      try {
        const [profileRes, statsRes, notifRes] = await Promise.all([
          api.get('/api/v1/profile'),
          api.get('/api/v1/dashboard/client/stats'),
          api.get('/api/v1/notifications/unread-count')
        ]);

        const profile = await profileRes.json();
        const stats   = await statsRes.json();
        const notif   = await notifRes.json();

        // ── Profile ───────────────────────────────────────────────────────
        document.getElementById('user-name').textContent = profile.name || 'Client';
        document.getElementById('user-av').textContent   = (profile.name||'C')[0].toUpperCase();

        // ── Notification badge ─────────────────────────────────────────────
        if (notif.count > 0) {
          document.getElementById('user-av').style.outline = '2px solid var(--rose)';
          document.title = `(${notif.count}) Dashboard — SkillBridge`;
        }

        updateNotifBadge(notif.count);

        // ── Stats ─────────────────────────────────────────────────────────

        // In loadDashboard(), REPLACE the stats section with:
const statCards = [
    { id:'stat-jobs',      val: stats.totalJobsPosted       || 0, lbl:'Jobs Posted',     color:'var(--teal)',
      svg:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>` },
    { id:'stat-proposals', val: stats.totalProposalsReceived || 0, lbl:'Total Proposals', color:'var(--purple)',
      svg:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>` },
    { id:'stat-active',    val: stats.activeProjects         || 0, lbl:'Active Projects', color:'var(--gold)',
      svg:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>` },
    { id:'stat-completed', val: stats.completedProjects      || 0, lbl:'Completed',       color:'var(--teal)',
      svg:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>` },
];

statCards.forEach(s => {
    const card = document.getElementById(s.id).closest('.stat-card');
    card.innerHTML = `
        <div style="width:40px;height:40px;border-radius:10px;margin:0 auto 0.75rem;
            background:${s.color}15;border:1px solid ${s.color}33;
            display:flex;align-items:center;justify-content:center;color:${s.color};">
            ${s.svg}
        </div>
        <div class="num" style="color:${s.color}">${s.val}</div>
        <div class="lbl">${s.lbl}</div>`;
});

        // Unread proposals alert
        if (stats.unreadProposals > 0) {
          const banner = document.createElement('div');
          banner.style.cssText = `
            background:rgba(0,201,167,0.08);border:1px solid rgba(0,201,167,0.2);
            border-radius:12px;padding:0.85rem 1.25rem;margin-bottom:1.5rem;
            font-size:0.9rem;color:var(--teal);font-weight:600;`;
          banner.innerHTML = `You have ${stats.unreadProposals} new proposal(s) waiting for review.`;
          document.querySelector('main').insertBefore(
              banner, document.querySelector('.stats-row'));
        }

      } catch(e) { console.error('Stats error', e); }

      // ── Posted jobs ────────────────────────────────────────────────────
      try {
        const res  = await api.get('/api/v1/jobs/my-jobs?size=20');
        const data = await res.json();
        const jobs = data.content || [];

        const list = document.getElementById('job-list');
        if (jobs.length === 0) {
          list.innerHTML = `
    <div class="empty-state" style="padding:3.5rem;background:var(--card);
        border:1px dashed var(--border2);border-radius:16px;">
        <div style="width:56px;height:56px;border-radius:16px;
            background:rgba(0,201,167,0.06);border:1px solid rgba(0,201,167,0.15);
            display:flex;align-items:center;justify-content:center;
            margin:0 auto 1rem;color:var(--teal);">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="12" y1="13" x2="12" y2="17"/>
                <line x1="10" y1="15" x2="14" y2="15"/>
            </svg>
        </div>
        <p style="font-weight:700;font-size:1rem;margin-bottom:0.4rem;">No jobs posted yet</p>
        <p style="font-size:0.85rem;color:var(--text3);margin-bottom:1.25rem;">
            Post your first job and start receiving proposals from top freelancers.
        </p>
        <a href="/post-job.html" style="color:#000;background:linear-gradient(135deg,var(--teal),var(--teal-dk));
            padding:0.6rem 1.5rem;border-radius:10px;font-weight:700;font-size:0.88rem;
            text-decoration:none;display:inline-block;">
            Post your first job
        </a>
    </div>`;
          return;
        }

        list.innerHTML = jobs.map(j => {
          const statusClass = 'status-' + (j.status||'open').toLowerCase();
          return `
            <div class="job-row">
              <div>
                <div class="jr-title">${escHtml(j.title)}</div>
                <div class="jr-meta">
                  ${j.category} ·
                  <strong style="color:var(--teal);">${j.proposalCount||0}</strong>
                  proposal${j.proposalCount===1?'':'s'} ·
                  Posted ${formatDate(j.createdAt)}
                </div>
              </div>
              <div style="display:flex;align-items:center;gap:1rem;">
                <span class="jr-status ${statusClass}">${j.status}</span>
                <div class="jr-actions">
                  <a href="/proposals-client.html?jobId=${j.id}"
                     class="btn-xs btn-view">
                    View Proposals
                    ${j.proposalCount > 0
                        ? `<span style="background:var(--teal);color:#000;border-radius:99px;
                             padding:0.1rem 0.45rem;font-size:0.72rem;margin-left:0.3rem;">
                             ${j.proposalCount}</span>`
                        : ''}
                  </a>
                </div>
              </div>
            </div>`;
        }).join('');
      } catch(e) { console.error('Jobs error', e); }
    }

    function updateNotifBadge(count) {
    const badge = document.getElementById('notif-badge');
    if (count > 0) {
        badge.style.display = 'block';
        badge.textContent   = count > 99 ? '99+' : count;
    } else {
        badge.style.display = 'none';
    }
}

function openNotifications() {
    window.location.href = '/notifications.html';
}

    // Poll notifications every 30 seconds
    setInterval(async () => {
    try {
        const res   = await api.get('/api/v1/notifications/unread-count');
        const notif = await res.json();
        updateNotifBadge(notif.count);  // ← add this
        if (notif.count > 0) {
            document.getElementById('user-av').style.outline = '2px solid var(--rose)';
            document.title = `(${notif.count}) Dashboard — SkillBridge`;
        } else {
            document.getElementById('user-av').style.outline = 'none';
            document.title = 'Dashboard — SkillBridge';
        }
    } catch(e) {}
}, 30000);

    loadDashboard();
</script>
</body>
</html>
