<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio — SkillBridge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
        :root {
          --bg:#060D1A; --card:#0D1829; --card2:#111f38;
          --teal:#00C9A7; --teal-dk:#00A389; --gold:#F5A623;
          --rose:#FF6B8A; --text:#E8F0FE; --text2:#8BA3C7; --text3:#4A6080;
          --border:#1A2D4A; --border2:#243650;
        }
        body { font-family:'DM Sans',sans-serif; background:var(--bg);
          color:var(--text); min-height:100vh; }

        /* Nav */
        nav { height:60px; background:var(--card);
              border-bottom:1px solid var(--border);
              display:flex; align-items:center;
              padding:0 1.5rem; gap:1.5rem; position:sticky; top:0; z-index:100; }
        .nav-logo { font-family:'Syne',sans-serif; font-weight:800;
          font-size:1.2rem;
          background:linear-gradient(135deg,var(--teal),var(--gold));
          -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .nav-links { display:flex; gap:1rem; margin-left:auto; }
        .nav-links a { font-size:0.85rem; color:var(--text2);
          text-decoration:none; transition:color 0.2s; }
        .nav-links a:hover { color:var(--teal); }

        /* Page */
        .page { max-width:900px; margin:0 auto; padding:2rem 1.5rem; }
        .page-header { display:flex; align-items:center;
          justify-content:space-between; margin-bottom:2rem; flex-wrap:wrap; gap:1rem; }
        .page-title { font-family:'Syne',sans-serif; font-weight:800;
          font-size:1.5rem; }
        .page-subtitle { font-size:0.88rem; color:var(--text2); margin-top:0.25rem; }

        /* Add button */
        .btn-add {
          padding:0.65rem 1.25rem; border-radius:10px; font-size:0.88rem;
          font-weight:700; cursor:pointer; font-family:'DM Sans',sans-serif;
          border:none; background:linear-gradient(135deg,var(--teal),var(--teal-dk));
          color:#000; display:flex; align-items:center; gap:0.4rem; transition:opacity 0.2s;
        }
        .btn-add:hover { opacity:0.9; }

        /* Grid */
        .portfolio-grid {
          display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
          gap:1.25rem;
        }

        /* Card */
        .pf-card {
          background:var(--card); border:1px solid var(--border2);
          border-radius:16px; overflow:hidden;
          transition:border-color 0.2s, transform 0.2s;
        }
        .pf-card:hover { border-color:var(--teal); transform:translateY(-2px); }
        .pf-thumbnail {
          width:100%; height:160px; object-fit:cover;
          background:var(--card2); display:flex; align-items:center;
          justify-content:center; color:var(--text3); font-size:0.8rem;
        }
        .pf-thumbnail img { width:100%; height:100%; object-fit:cover; }
        .pf-body { padding:1rem; }
        .pf-category {
          font-size:0.7rem; font-weight:700; letter-spacing:0.08em;
          text-transform:uppercase; color:var(--teal); margin-bottom:0.4rem;
        }
        .pf-title { font-weight:700; font-size:0.95rem;
          margin-bottom:0.4rem; line-height:1.4; }
        .pf-desc { font-size:0.82rem; color:var(--text2); line-height:1.5;
          margin-bottom:0.75rem;
          display:-webkit-box; -webkit-line-clamp:2;
          -webkit-box-orient:vertical; overflow:hidden; }
        .pf-tags { display:flex; flex-wrap:wrap; gap:0.4rem; margin-bottom:0.85rem; }
        .pf-tag {
          padding:0.2rem 0.55rem; border-radius:99px; font-size:0.72rem;
          font-weight:600; background:rgba(0,201,167,0.08);
          color:var(--teal); border:1px solid rgba(0,201,167,0.15);
        }
        .pf-actions { display:flex; gap:0.5rem; }
        .btn-sm {
          flex:1; padding:0.45rem; border-radius:8px; font-size:0.78rem;
          font-weight:600; cursor:pointer; font-family:'DM Sans',sans-serif;
          border:1px solid var(--border2); background:transparent;
          color:var(--text2); transition:all 0.2s;
        }
        .btn-sm:hover { border-color:var(--teal); color:var(--teal); }
        .btn-sm.danger:hover { border-color:var(--rose); color:var(--rose); }
        .btn-sm.primary {
          background:linear-gradient(135deg,var(--teal),var(--teal-dk));
          color:#000; border:none; font-weight:700;
        }

        /* Empty state */
        .empty { text-align:center; padding:4rem 2rem; }
        .empty-icon { font-size:3rem; margin-bottom:1rem; opacity:0.3; }
        .empty h3 { font-size:1.1rem; margin-bottom:0.5rem; color:var(--text2); }
        .empty p  { font-size:0.85rem; color:var(--text3); }

        /* Modal */
        .modal-overlay {
          position:fixed; inset:0; background:rgba(0,0,0,0.7);
          z-index:1000; display:flex; align-items:center;
          justify-content:center; padding:1rem;
        }
        .modal {
          background:var(--card); border:1px solid var(--border2);
          border-radius:20px; padding:2rem; width:100%; max-width:520px;
          max-height:90vh; overflow-y:auto;
        }
        .modal h3 { font-family:'Syne',sans-serif; font-weight:700;
          font-size:1.1rem; margin-bottom:1.5rem; }
        label { display:block; font-size:0.82rem; font-weight:600;
          color:var(--text2); margin-bottom:0.35rem; }
        input, textarea, select {
          width:100%; padding:0.75rem 1rem; border-radius:10px;
          background:#0B1425; border:1px solid var(--border2);
          color:var(--text); font-family:'DM Sans',sans-serif;
          font-size:0.88rem; outline:none; transition:border-color 0.2s;
          margin-bottom:1rem;
        }
        textarea { resize:vertical; min-height:90px; }
        input:focus, textarea:focus, select:focus {
          border-color:var(--teal);
          box-shadow:0 0 0 3px rgba(0,201,167,0.1);
        }
        select option { background:var(--card); }
        .modal-actions { display:flex; gap:0.75rem; margin-top:0.5rem; }
        .btn-cancel {
          flex:1; padding:0.8rem; border-radius:10px; font-size:0.9rem;
          font-weight:600; cursor:pointer; font-family:'DM Sans',sans-serif;
          border:1px solid var(--border2); background:transparent;
          color:var(--text2);
        }
        .btn-save {
          flex:2; padding:0.8rem; border-radius:10px; font-size:0.9rem;
          font-weight:700; cursor:pointer; font-family:'DM Sans',sans-serif;
          border:none;
          background:linear-gradient(135deg,var(--teal),var(--teal-dk));
          color:#000;
        }

        /* Toast */
        .toast {
          position:fixed; bottom:1.5rem; right:1.5rem;
          padding:0.85rem 1.25rem; border-radius:12px;
          font-size:0.88rem; font-weight:600; z-index:2000;
          opacity:0; transform:translateY(8px);
          transition:all 0.3s; pointer-events:none;
        }
        .toast.show { opacity:1; transform:translateY(0); }
        .toast.success { background:#0D2A24; color:var(--teal);
          border:1px solid rgba(0,201,167,0.2); }
        .toast.error { background:#2A0D18; color:var(--rose);
          border:1px solid rgba(255,107,138,0.2); }
    </style>
</head>
<body>

<nav>
    <div class="nav-logo">SkillBridge</div>
    <div class="nav-links">
        <a href="/jobs.html">Browse Jobs</a>
        <a href="/my-projects.html">Projects</a>
        <a href="/profile.html">Profile</a>
    </div>
    <!-- Add after .nav-links in nav -->
    <button onclick="localStorage.clear();window.location.replace('/login.html')"
            style="margin-left:auto;padding:0.4rem 1rem;border-radius:8px;
               font-size:0.85rem;font-weight:600;cursor:pointer;
               font-family:'DM Sans',sans-serif;background:transparent;
               border:1px solid var(--border2);color:var(--text2);transition:all 0.2s;"
            onmouseover="this.style.borderColor='var(--rose)';this.style.color='var(--rose)'"
            onmouseout="this.style.borderColor='var(--border2)';this.style.color='var(--text2)'">
        Logout
    </button>
</nav>

<div class="page">
    <div class="page-header">
        <div>
            <h1 class="page-title">My Portfolio</h1>
            <p class="page-subtitle" id="item-count">Loading…</p>
        </div>
        <button class="btn-add" onclick="openModal()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2.5">
                <line x1="12" y1="5" x2="12" y2="19"/>
                <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            Add Project
        </button>
    </div>

    <!-- Grid -->
    <div class="portfolio-grid" id="portfolio-grid">
        <!-- Cards injected here -->
    </div>

    <!-- Empty state -->
    <div class="empty" id="empty-state" style="display:none;">
        <div class="empty-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="1.5">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
                <path d="M3 9h18M9 21V9"/>
            </svg>
        </div>
        <h3>No portfolio items yet</h3>
        <p>Showcase your best work to attract clients</p>
    </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="modal" style="display:none;"
     onclick="if(event.target===this)closeModal()">
    <div class="modal">
        <h3 id="modal-title">Add Portfolio Item</h3>

        <label>Project Title *</label>
        <input type="text" id="f-title" placeholder="e.g. E-commerce Platform">

        <label>Category</label>
        <select id="f-category">
            <option value="">Select category</option>
            <option value="WEB_DEV">Web Development</option>
            <option value="MOBILE">Mobile App</option>
            <option value="DESIGN">Design / UI</option>
            <option value="DATA">Data / Analytics</option>
            <option value="WRITING">Writing / Content</option>
            <option value="VIDEO">Video / Animation</option>
            <option value="OTHER">Other</option>
        </select>

        <label>Description</label>
        <textarea id="f-description"
                  placeholder="What did you build? What technologies did you use?"></textarea>

        <label>Live URL (optional)</label>
        <input type="url" id="f-projectUrl"
               placeholder="https://yourproject.com">

        <label>Thumbnail URL (optional)</label>
        <input type="url" id="f-imageUrl"
               placeholder="https://i.imgur.com/example.png">

        <label>Tags (comma-separated)</label>
        <input type="text" id="f-tags"
               placeholder="React, Node.js, MongoDB">

        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal()">Cancel</button>
            <button class="btn-save" id="save-btn" onclick="saveItem()">
                Save Project
            </button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script src="/js/api.js"></script>
<script>
    const token = localStorage.getItem('sb_jwt');
if (!token) window.location.replace('/login.html');

const escHtml = s => s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;') : '';

    let items       = [];
    let editingId   = null;

    async function loadPortfolio() {
        try {
            const res  = await api.get('/api/v1/portfolio/me');
            items      = await res.json();
            renderGrid();
        } catch(e) {
            showToast('Failed to load portfolio', 'error');
        }
    }

    function renderGrid() {
        const grid  = document.getElementById('portfolio-grid');
        const empty = document.getElementById('empty-state');
        const count = document.getElementById('item-count');

        count.textContent = `${items.length} project${items.length !== 1 ? 's' : ''}`;

        if (items.length === 0) {
            grid.innerHTML = '';
            empty.style.display = 'block';
            return;
        }
        empty.style.display = 'none';

        const catLabels = {
            WEB_DEV:'Web Development', MOBILE:'Mobile App',
            DESIGN:'Design / UI', DATA:'Data / Analytics',
            WRITING:'Writing', VIDEO:'Video', OTHER:'Other'
        };

        grid.innerHTML = items.map(item => `
            <div class="pf-card">
                <div class="pf-thumbnail">
                    ${item.imageUrl
                        ? `<img src="${item.imageUrl}" alt="${item.title}"
                               onerror="this.parentElement.innerHTML='No preview'">`
                        : 'No preview'}
                </div>
                <div class="pf-body">
                    ${item.category
                        ? `<div class="pf-category">
                               ${catLabels[item.category] || item.category}
                           </div>` : ''}
<div class="pf-title">${escHtml(item.title)}</div>
                    ${item.description
                        ? `<div class="pf-desc">${escHtml(item.description)}</div>` : ''}
                    ${item.tags && item.tags.length
                        ? `<div class="pf-tags">
                               ${item.tags.map(t =>
                                   `<span class="pf-tag">${t}</span>`
                               ).join('')}
                           </div>` : ''}
                    <div class="pf-actions">
                        ${item.projectUrl
                            ? `<a href="${item.projectUrl}" target="_blank"
                                  style="flex:1;text-decoration:none;">
                                   <button class="btn-sm primary"
                                           style="width:100%">View Live</button>
                               </a>` : ''}
                        <button class="btn-sm"
                                onclick="openModal(${item.id})">Edit</button>
                        <button class="btn-sm danger"
                                onclick="deleteItem(${item.id})">Delete</button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function openModal(id) {
        editingId = id || null;
        document.getElementById('modal-title').textContent =
            editingId ? 'Edit Portfolio Item' : 'Add Portfolio Item';

        if (editingId) {
            const item = items.find(i => i.id === editingId);
            if (item) {
                document.getElementById('f-title').value =
                    item.title || '';
                document.getElementById('f-category').value =
                    item.category || '';
                document.getElementById('f-description').value =
                    item.description || '';
                document.getElementById('f-projectUrl').value =
                    item.projectUrl || '';
                document.getElementById('f-imageUrl').value =
                    item.imageUrl || '';
                document.getElementById('f-tags').value =
                    (item.tags || []).join(', ');
            }
        } else {
            ['f-title','f-description','f-projectUrl',
             'f-imageUrl','f-tags'].forEach(id => {
                document.getElementById(id).value = '';
            });
            document.getElementById('f-category').value = '';
        }
        document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
        editingId = null;
    }

    async function saveItem() {
        const title = document.getElementById('f-title').value.trim();
        if (!title) { showToast('Title is required', 'error'); return; }

        const payload = {
            title,
            category:    document.getElementById('f-category').value,
            description: document.getElementById('f-description').value.trim(),
            projectUrl:  document.getElementById('f-projectUrl').value.trim(),
            imageUrl:    document.getElementById('f-imageUrl').value.trim(),
            tags:        document.getElementById('f-tags').value.trim()
        };

        const btn = document.getElementById('save-btn');
        btn.disabled = true;
        btn.textContent = 'Saving…';

        try {
            const res = editingId
                ? await api.put(`/api/v1/portfolio/${editingId}`, payload)
                : await api.post('/api/v1/portfolio', payload);

            if (res.ok) {
                showToast(editingId
                    ? 'Project updated!' : 'Project added!', 'success');
                closeModal();
                loadPortfolio();
            } else {
                const data = await res.json();
                showToast(data.message || 'Save failed', 'error');
            }
        } catch(e) {
            showToast('Network error', 'error');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Save Project';
        }
    }

    async function deleteItem(id) {
        if (!confirm('Delete this portfolio item? This cannot be undone.')) return;
        try {
            const res = await api.delete(`/api/v1/portfolio/${id}`);
            if (res.ok) {
                showToast('Project deleted', 'success');
                loadPortfolio();
            }
        } catch(e) {
            showToast('Network error', 'error');
        }
    }

    function showToast(msg, type='success') {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className   = `toast ${type} show`;
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    // Also add portfolio tab to profile.html
    // (see TASK 15 below)

    loadPortfolio();
</script>
</body>
</html>
