<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%2300C9A7'/%3E%3Cstop offset='100%25' stop-color='%23F5A623'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='8' fill='url(%23g)'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-family='Arial Black,sans-serif' font-weight='900' font-size='14' fill='white'%3ESB%3C/text%3E%3C/svg%3E">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Detail — SkillBridge</title>
    <meta name="description" content="SkillBridge connects top Indian freelancers with clients. AI-powered proposal scoring, real-time chat, and verified reviews.">
    <meta name="theme-color" content="#00C9A7">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="/js/theme.js"></script>
    <style>
        *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
        :root {
          --bg:#060D1A; --bg2:#0B1425; --card:#0D1829; --card2:#111f38;
          --teal:#00C9A7; --teal-dk:#00A389; --gold:#F5A623; --purple:#7B61FF;
          --rose:#FF6B8A; --text:#E8F0FE; --text2:#8BA3C7; --text3:#5A7090;
          --border:#1A2D4A; --border2:#243650;
        }
        [data-theme="light"] {
          --bg:#F8FAFC; --bg2:#F1F5F9; --card:#FFFFFF; --card2:#F8FAFC;
          --text:#0F172A; --text2:#475569; --text3:#64748B;
          --border:#E2E8F0; --border2:#CBD5E1;
        }
        body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

        nav {
          display:flex; align-items:center; justify-content:space-between;
          padding:0 5%; height:64px; background:var(--bg);
          border-bottom:1px solid var(--border); position:sticky; top:0; z-index:50;
          backdrop-filter:blur(12px);
        }
        .nav-logo { font-family:'Syne',sans-serif; font-weight:800; font-size:1.35rem;
          background:linear-gradient(135deg,var(--teal),var(--gold));
          -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
        .nav-links { display:flex; gap:1.5rem; align-items:center; }
        .nav-links a { font-size:0.88rem; color:var(--text2); text-decoration:none; transition:color 0.2s; }
        .nav-links a:hover, .nav-links a.active { color:var(--teal); }
        .user-av {
          width:36px; height:36px; border-radius:50%;
          background:linear-gradient(135deg,var(--gold),var(--rose));
          display:flex; align-items:center; justify-content:center;
          font-weight:700; font-size:0.85rem; color:#fff; flex-shrink:0;
        }
        .btn-sm { padding:0.4rem 1rem; border-radius:8px; font-size:0.85rem; font-weight:600; cursor:pointer; font-family:'DM Sans',sans-serif; }
        .btn-logout { background:transparent; border:1px solid var(--border2); color:var(--text2); transition:all 0.2s; }
        .btn-logout:hover { border-color:var(--rose); color:var(--rose); }

        main { max-width:1100px; margin:0 auto; padding:2rem 5%; }
        .back-link {
          display:inline-flex; align-items:center; gap:0.45rem; color:var(--text2);
          text-decoration:none; font-size:0.85rem; margin-bottom:1.5rem;
          transition:color 0.2s; font-weight:500;
        }
        .back-link:hover { color:var(--teal); }
        .back-link:hover svg { transform:translateX(-2px); }
        .back-link svg { transition:transform 0.2s; }

        .layout { display:grid; grid-template-columns:1fr 340px; gap:1.5rem; align-items:start; }
        @media(max-width:768px) { .layout { grid-template-columns:1fr; } }

        /* Main card */
        .main-card {
          background:var(--card); border:1px solid var(--border2); border-radius:20px;
          overflow:hidden; margin-bottom:1rem;
        }
        .job-card-header {
          padding:2rem 2rem 1.5rem;
          background:linear-gradient(155deg, rgba(0,201,167,0.05) 0%, transparent 60%);
          border-bottom:1px solid var(--border); position:relative;
        }
        .job-card-header::after {
          content:''; position:absolute; top:0; left:0; right:0; height:2px;
          background:linear-gradient(90deg, var(--teal), var(--purple), transparent);
          opacity:0.55;
        }
        .job-card-body { padding:1.5rem 2rem 2rem; }

        .job-title { font-family:'Syne',sans-serif; font-weight:800; font-size:1.65rem;
          margin-bottom:0.75rem; line-height:1.25; color:var(--text); }
        .job-meta { display:flex; flex-wrap:wrap; gap:0.6rem; }
        .meta-chip {
          display:inline-flex; align-items:center; gap:0.35rem;
          font-size:0.78rem; color:var(--text2);
          background:var(--bg2); border:1px solid var(--border2);
          padding:0.25rem 0.75rem; border-radius:99px; white-space:nowrap;
        }
        .meta-chip svg { opacity:0.55; flex-shrink:0; }
        .status-badge {
          display:inline-flex; align-items:center; gap:0.4rem;
          padding:0.25rem 0.75rem; border-radius:99px; font-size:0.78rem; font-weight:700;
          background:rgba(0,201,167,0.1); color:var(--teal); border:1px solid rgba(0,201,167,0.2);
        }
        .status-dot {
          width:6px; height:6px; border-radius:50%; background:var(--teal);
          animation:pulse-dot 2s ease-in-out infinite;
        }
        @keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.45;transform:scale(0.65)} }

        /* Section titles */
        .section-title {
          display:flex; align-items:center; gap:0.55rem;
          font-family:'Syne',sans-serif; font-weight:700; font-size:0.8rem;
          color:var(--teal); text-transform:uppercase; letter-spacing:0.1em;
          margin:1.75rem 0 0.85rem;
        }
        .section-title-bar { width:3px; height:14px; background:var(--teal); border-radius:99px; flex-shrink:0; }

        .job-description { font-size:0.9rem; color:var(--text2); line-height:1.8; white-space:pre-wrap; max-width:70ch; }

        /* Skills */
        .skills-list { display:flex; flex-wrap:wrap; gap:0.45rem; }
        .skill-tag {
          display:inline-flex; align-items:center; gap:0.3rem;
          padding:0.28rem 0.75rem; border-radius:99px; font-size:0.8rem; font-weight:600;
          background:rgba(123,97,255,0.1); color:var(--purple); border:1px solid rgba(123,97,255,0.2);
          transition:transform 0.15s; cursor:default;
        }
        .skill-tag:hover { transform:translateY(-1px); }
        .skill-tag.matched { background:rgba(0,201,167,0.08); color:var(--teal); border-color:rgba(0,201,167,0.22); }
        .skill-tag.missing { background:rgba(255,107,138,0.08); color:var(--rose); border-color:rgba(255,107,138,0.22); }
        .skill-legend { display:flex; gap:1.25rem; margin-top:0.65rem; font-size:0.75rem; color:var(--text3); }
        .skill-legend span { display:inline-flex; align-items:center; gap:0.35rem; }

        /* Attachments */
        .attachment-row {
          display:flex; align-items:center; gap:0.75rem; text-decoration:none; color:var(--text);
          padding:0.65rem 0.9rem; border-radius:10px;
          background:rgba(255,255,255,0.03); border:1px solid var(--border2);
          margin-bottom:0.5rem; font-size:0.85rem; transition:all 0.2s;
        }
        .attachment-row:hover { border-color:var(--teal); background:rgba(0,201,167,0.04); }
        .attachment-icon {
          width:34px; height:34px; border-radius:8px; flex-shrink:0;
          display:flex; align-items:center; justify-content:center;
        }
        .attachment-icon.img-type { background:rgba(123,97,255,0.12); color:var(--purple); }
        .attachment-icon.doc-type { background:rgba(0,201,167,0.1); color:var(--teal); }
        .attachment-name { font-weight:500; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .attachment-dl { display:flex; align-items:center; gap:0.3rem; font-size:0.75rem; color:var(--text3); flex-shrink:0; }

        /* AI card */
        .ai-card {
          background:linear-gradient(135deg, rgba(0,201,167,0.05), rgba(123,97,255,0.05));
          border:1px solid rgba(0,201,167,0.18); border-radius:16px; padding:1.5rem;
          margin-bottom:1rem; position:relative; overflow:hidden;
        }
        .ai-card::before {
          content:''; position:absolute; top:0; left:-100%; width:100%; height:2px;
          background:linear-gradient(90deg, transparent, var(--teal), transparent);
          animation:shimmer 3.5s ease-in-out infinite;
        }
        @keyframes shimmer { to { left:200%; } }
        .ai-card-title {
          display:flex; align-items:center; gap:0.5rem;
          font-size:0.78rem; font-weight:700; color:var(--teal);
          text-transform:uppercase; letter-spacing:0.1em; margin-bottom:1rem;
        }
        .score-ring { text-align:center; margin-bottom:1rem; }
        .ai-badge-lg {
          display:inline-block; padding:0.3rem 1rem; border-radius:99px;
          font-size:0.82rem; font-weight:700; margin-top:0.5rem;
        }
        .badge-green-lg { background:rgba(0,201,167,0.12); color:var(--teal); border:1px solid rgba(0,201,167,0.25); }
        .badge-amber-lg { background:rgba(245,166,35,0.12); color:var(--gold); border:1px solid rgba(245,166,35,0.25); }
        .badge-red-lg   { background:rgba(255,107,138,0.12); color:var(--rose); border:1px solid rgba(255,107,138,0.25); }
        .ai-reason {
          font-size:0.84rem; color:var(--text2); line-height:1.65; margin-top:0.85rem;
          padding:0.85rem 1rem; background:rgba(0,0,0,0.2); border-radius:10px;
          border-left:3px solid rgba(0,201,167,0.25);
        }
        .ai-enriching {
          display:flex; align-items:center; gap:0.4rem;
          font-size:0.76rem; color:var(--text3); margin-top:0.65rem; font-style:italic;
        }

        /* Sidebar */
        .side-card {
          background:var(--card); border:1px solid var(--border2); border-radius:16px;
          padding:1.25rem; margin-bottom:1rem;
        }
        .side-card-title {
          display:flex; align-items:center; gap:0.45rem;
          font-size:0.75rem; font-weight:700; color:var(--text3);
          text-transform:uppercase; letter-spacing:0.1em; margin-bottom:1rem;
        }
        .detail-row {
          display:flex; justify-content:space-between; align-items:center;
          padding:0.5rem 0; border-bottom:1px solid var(--border); font-size:0.875rem;
        }
        .detail-row:last-child { border-bottom:none; }
        .detail-row .label { color:var(--text2); display:flex; align-items:center; gap:0.4rem; }
        .detail-row .value { font-weight:600; color:var(--text); }

        /* Client card */
        .client-av {
          width:44px; height:44px; border-radius:12px; flex-shrink:0;
          background:linear-gradient(135deg,var(--teal-dk),var(--purple));
          display:flex; align-items:center; justify-content:center;
          font-family:'Syne',sans-serif; font-weight:800; font-size:1rem; color:#fff;
        }
        .client-name { font-weight:700; font-size:0.95rem; }
        .client-label { font-size:0.75rem; color:var(--text3); margin-top:0.1rem; }
        .competition-row { margin-top:0.85rem; padding-top:0.85rem; border-top:1px solid var(--border); }
        .comp-header { display:flex; justify-content:space-between; font-size:0.75rem; margin-bottom:0.45rem; }
        .comp-bar { height:5px; border-radius:99px; background:var(--border2); overflow:hidden; }
        .comp-fill { height:100%; border-radius:99px; transition:width 0.9s ease; }

        /* Apply card */
        .apply-card {
          background:var(--card2); border:1px solid var(--border2); border-radius:16px;
          padding:1.5rem; margin-bottom:1rem; position:sticky; top:80px;
          box-shadow:0 8px 40px rgba(0,201,167,0.07);
        }
        .apply-card-header { display:flex; align-items:center; gap:0.65rem; margin-bottom:1.25rem; }
        .apply-card-header h3 { font-family:'Syne',sans-serif; font-weight:800; font-size:1.05rem; }
        .apply-icon {
          width:36px; height:36px; border-radius:10px; flex-shrink:0;
          background:linear-gradient(135deg,var(--teal),var(--teal-dk));
          display:flex; align-items:center; justify-content:center;
        }
        .form-group { margin-bottom:1rem; }
        .form-group label {
          display:flex; align-items:center; gap:0.4rem;
          font-size:0.82rem; font-weight:600; color:var(--text2); margin-bottom:0.45rem;
        }
        .form-group label .lbl-right { margin-left:auto; font-weight:400; color:var(--text3); }
        .form-control {
          width:100%; background:var(--bg2); border:1px solid var(--border2);
          border-radius:10px; padding:0.65rem 0.9rem; font-size:0.88rem;
          color:var(--text); font-family:'DM Sans',sans-serif; outline:none;
          transition:border-color 0.2s, box-shadow 0.2s;
        }
        .form-control:focus { border-color:var(--teal); box-shadow:0 0 0 3px rgba(0,201,167,0.1); }
        .form-control::placeholder { color:var(--text3); }
        textarea.form-control { resize:vertical; min-height:120px; }
        .rate-wrap { position:relative; }
        .rate-curr { position:absolute; left:0.9rem; top:50%; transform:translateY(-50%);
          color:var(--text3); pointer-events:none; font-weight:700; }
        .rate-wrap .form-control { padding-left:1.6rem; }
        .char-count { font-size:0.75rem; color:var(--text3); text-align:right; margin-top:0.3rem; }

        /* Upload */
        .upload-area {
          border:2px dashed var(--border2); border-radius:10px; padding:1.1rem;
          text-align:center; cursor:pointer; transition:all 0.2s;
          font-size:0.82rem; color:var(--text3);
        }
        .upload-area:hover { border-color:var(--teal); background:rgba(0,201,167,0.03); }
        .upload-area svg { display:block; margin:0 auto 0.5rem; opacity:0.45; }
        .file-preview-row {
          display:flex; align-items:center; gap:0.65rem; margin-top:0.5rem;
          padding:0.55rem 0.85rem; background:rgba(0,201,167,0.06);
          border:1px solid rgba(0,201,167,0.18); border-radius:8px; font-size:0.82rem;
        }
        .file-preview-name { color:var(--teal); flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .remove-file-btn { background:none; border:none; cursor:pointer; color:var(--text3); display:flex; align-items:center; padding:0; transition:color 0.2s; }
        .remove-file-btn:hover { color:var(--rose); }

        /* Apply button */
        .apply-btn {
          width:100%; padding:0.85rem; border-radius:12px; font-weight:700;
          font-size:0.95rem; font-family:'Syne',sans-serif;
          background:linear-gradient(135deg,var(--teal),var(--teal-dk));
          border:none; color:#000; cursor:pointer;
          display:flex; align-items:center; justify-content:center; gap:0.5rem;
          transition:opacity 0.2s, transform 0.15s;
        }
        .apply-btn:not(:disabled):hover { opacity:0.92; transform:translateY(-1px); }
        .apply-btn:not(:disabled):active { transform:translateY(0); }
        .apply-btn:disabled { opacity:0.45; cursor:not-allowed; }
        @keyframes glow-pulse {
          0%,100% { box-shadow:0 4px 20px rgba(0,201,167,0.28); }
          50%      { box-shadow:0 4px 36px rgba(0,201,167,0.52); }
        }
        .apply-btn:not(:disabled) { animation:glow-pulse 2.5s ease-in-out infinite; }

        /* Applied state */
        .applied-msg {
          text-align:center; padding:1.35rem; background:rgba(0,201,167,0.07);
          border:1px solid rgba(0,201,167,0.2); border-radius:12px;
          color:var(--teal); font-weight:600; font-size:0.9rem;
          animation:fadeInUp 0.4s ease;
        }
        .applied-msg svg { display:block; margin:0 auto 0.75rem; }
        @keyframes fadeInUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

        /* Similar */
        .similar-card {
          background:var(--card); border:1px solid var(--border2); border-radius:12px;
          padding:1rem 1.25rem; margin-bottom:0.6rem; text-decoration:none;
          display:block; transition:all 0.2s;
        }
        .similar-card:hover { border-color:var(--teal); background:rgba(0,201,167,0.03); }
        .similar-title { font-weight:700; font-size:0.88rem; color:var(--text); margin-bottom:0.25rem; }
        .similar-meta  { font-size:0.78rem; color:var(--text3); }
        .similar-heading {
          font-family:'Syne',sans-serif; font-weight:700; font-size:0.95rem;
          margin:1.5rem 0 0.75rem; display:flex; align-items:center; gap:0.5rem;
        }

        .toast {
          position:fixed; bottom:1.5rem; right:1.5rem; z-index:999;
          background:var(--card2); border-radius:12px;
          padding:0.85rem 1.25rem; font-size:0.88rem; font-weight:600;
          display:none; box-shadow:0 8px 24px rgba(0,0,0,0.4);
          animation:fadeInUp 0.3s ease;
        }
        .loading { text-align:center; padding:5rem; color:var(--text3); }
        .spinner {
          width:40px; height:40px; border-radius:50%;
          border:3px solid var(--border2); border-top-color:var(--teal);
          animation:spin 0.8s linear infinite; margin:0 auto 1rem;
        }
        @keyframes spin { to { transform:rotate(360deg); } }
    </style>
</head>
<body>
<nav>
    <a href="/" class="nav-logo">SkillBridge</a>
    <div class="nav-links">
        <a href="/jobs.html" class="active">Browse Jobs</a>
        <a href="/dashboard-freelancer.html">Dashboard</a>
        <a href="/community.html">Community</a>
        <a href="/profile.html">Profile</a>
    </div>
    <div style="display:flex;align-items:center;gap:0.75rem;">
        <button class="notif-btn" id="theme-toggle" onclick="toggleTheme()" aria-label="Toggle Theme" style="width:32px; height:32px; padding:6px; display:flex; align-items:center; justify-content:center; border:1px solid var(--border2); border-radius:8px; background:transparent; cursor:pointer; color:var(--text2);">
            <span class="theme-toggle-icon"></span>
        </button>
        <div class="user-av" id="user-av"
             onclick="window.location.href='/profile.html'"
             title="View Profile"
             style="cursor:pointer;">?</div>
        <button class="btn-sm btn-logout" onclick="logout()">Logout</button>
    </div>
</nav>

<main id="main-content">
    <div class="loading">
        <div class="spinner"></div>
        Loading job details…
    </div>
</main>

<div class="toast" id="toast"></div>

<script src="/js/utils.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script>
    requireAuth('FREELANCER');

    const jobId = new URLSearchParams(window.location.search).get('id');
    if (!jobId) window.location.replace('/jobs.html');

    let jobData = null;
    let uploadedFileUrl = null;

    /* ── Inline SVG icons (no emojis) ── */
    const I = {
      back:     `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>`,
      check:    `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`,
      x:        `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
      xMd:      `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
      arrow:    `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>`,
      checkCircle:`<svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="9 12 11 14 15 10"/></svg>`,
      image:    `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`,
      file:     `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`,
      fileSm:   `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`,
      download: `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`,
      upload:   `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>`,
      clip:     `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>`,
      ai:       `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.663 17h4.673M12 3v1m6.364 1.636-.707.707M21 12h-1M4 12H3m3.343-5.657-.707-.707m2.828 9.9a5 5 0 1 1 7.072 0l-.548.547A3.374 3.374 0 0 0 14 18.469V19a2 2 0 1 1-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>`,
      spin:     `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="animation:spin 0.9s linear infinite"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>`,
      cal:      `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`,
      users:    `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`,
      dollar:   `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>`,
      grid:     `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>`,
      user:     `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`,
      dollar2:  `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>`,
      letter:   `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`,
      search:   `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`,
    };

    async function loadJob() {
        try {
            const [profileRes, jobRes] = await Promise.all([
                api.get('/api/v1/profile'),
                api.get(`/api/v1/jobs/${jobId}`)
            ]);
            const profile = await profileRes.json();
            jobData = await jobRes.json();
const av = document.getElementById('user-av');
const savedAvatar = localStorage.getItem('sb_avatar') || profile.avatarUrl;
if (savedAvatar) {
    av.innerHTML = `<img src="${savedAvatar}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;
    if (profile.avatarUrl) localStorage.setItem('sb_avatar', profile.avatarUrl);
} else {
    av.textContent = (profile.name||'?')[0].toUpperCase();
}
            document.title = `${jobData.title} — SkillBridge`;
            renderPage(jobData, profile);
            loadSimilarJobs();
        } catch(e) {
            document.getElementById('main-content').innerHTML =
                `<div class="loading">Failed to load job. <a href="/jobs.html" style="color:var(--teal)">Go back</a></div>`;
        }
    }

    function getCompetition(count) {
        if (count <= 3)  return { label:'Low competition',      color:'var(--teal)', pct:18 };
        if (count <= 10) return { label:'Moderate competition', color:'var(--gold)', pct:52 };
        return               { label:'High competition',       color:'var(--rose)', pct:88 };
    }

    function renderPage(job, profile) {
        const skillList = typeof job.requiredSkills === 'string'
            ? job.requiredSkills.split(',').map(s => s.trim()).filter(Boolean)
            : (job.requiredSkills || []);
        const matched = job.matchedSkills || [];
        const missing = job.missingSkills || [];

        const badgeClass  = job.aiPreviewBadge === 'GREEN' ? 'badge-green-lg' : job.aiPreviewBadge === 'AMBER' ? 'badge-amber-lg' : 'badge-red-lg';
        const badgeLabel  = job.aiPreviewBadge === 'GREEN' ? 'Strong Match' : job.aiPreviewBadge === 'AMBER' ? 'Partial Match' : 'Weak Match';
        const scoreColor  = job.aiPreviewBadge === 'GREEN' ? '#00C9A7' : job.aiPreviewBadge === 'AMBER' ? '#F5A623' : '#FF6B8A';
        const scoreColorV = job.aiPreviewBadge === 'GREEN' ? 'var(--teal)' : job.aiPreviewBadge === 'AMBER' ? 'var(--gold)' : 'var(--rose)';

        const comp = getCompetition(job.proposalCount || 0);
        const clientInitial = (job.clientName || 'C')[0].toUpperCase();

        document.getElementById('main-content').innerHTML = `
        <a href="/jobs.html" class="back-link">${I.back} Back to Jobs</a>

        <div class="layout">
          <!-- Left -->
          <div>
            <div class="main-card">
              <div class="job-card-header">
                <div class="job-title">${escHtml(job.title)}</div>
                <div class="job-meta">
                  <span class="status-badge"><span class="status-dot"></span>${job.status || 'OPEN'}</span>
                  <span class="meta-chip">${I.grid} ${job.category || ''}</span>
                  <span class="meta-chip">${I.user} ${escHtml(job.clientName || 'Client')}</span>
                  <span class="meta-chip">${I.cal} Posted ${formatDate(job.createdAt)}</span>
                  <span class="meta-chip">${I.users} ${job.proposalCount || 0} proposals</span>
                  ${job.deadline ? `<span class="meta-chip">${I.cal} Deadline ${formatDate(job.deadline)}</span>` : ''}
                </div>
              </div>
              <div class="job-card-body">
                <div class="section-title"><span class="section-title-bar"></span>About this Job</div>
                <div class="job-description">${escHtml(job.description || '')}</div>

                <div class="section-title"><span class="section-title-bar"></span>Required Skills</div>
                <div class="skills-list">
                  ${skillList.map(s => {
                    const isM = matched.includes(s), isMi = missing.includes(s);
                    const cls  = isM ? 'matched' : isMi ? 'missing' : '';
                    const icon = isM ? I.check    : isMi ? I.x       : '';
                    return `<span class="skill-tag ${cls}">${icon}${escHtml(s)}</span>`;
                  }).join('')}
                </div>
                ${matched.length || missing.length ? `
                <div class="skill-legend">
                  <span style="color:var(--teal);">${I.check} matched</span>
                  <span style="color:var(--rose);">${I.x} missing</span>
                </div>` : ''}

                ${(job.attachments && job.attachments.length) ? `
                <div class="section-title"><span class="section-title-bar"></span>${I.clip} Attachments</div>
                <div>
                  ${job.attachments.map(a => {
                    const isImg = /\.(png|jpg|jpeg|gif|webp)$/i.test(a.name);
                    return `<a href="${a.url}" target="_blank" download="${escHtml(a.name)}" class="attachment-row">
                      <div class="attachment-icon ${isImg ? 'img-type' : 'doc-type'}">${isImg ? I.image : I.file}</div>
                      <span class="attachment-name">${escHtml(a.name)}</span>
                      <span class="attachment-dl">${I.download} Download</span>
                    </a>`;
                  }).join('')}
                </div>` : ''}
              </div>
            </div>

            ${job.aiPreviewScore != null ? `
            <div class="ai-card">
              <div class="ai-card-title">${I.ai} AI Match Analysis</div>
              <div class="score-ring">
                <svg width="112" height="112" viewBox="0 0 112 112" style="display:block;margin:0 auto 0.5rem">
                  <circle cx="56" cy="56" r="46" fill="none" stroke="var(--border2)" stroke-width="8"/>
                  <circle cx="56" cy="56" r="46" fill="none"
                    stroke="${scoreColor}" stroke-width="8" stroke-linecap="round"
                    stroke-dasharray="${(job.aiPreviewScore/100)*289} 289"
                    stroke-dashoffset="72"
                    style="transition:stroke-dasharray 1s ease;filter:drop-shadow(0 0 8px ${scoreColor}66)"/>
                  <text x="56" y="52" text-anchor="middle" font-family="Syne,sans-serif"
                    font-weight="800" font-size="22" fill="${scoreColor}">
                    ${job.aiPreviewScore?.toFixed(0)}%
                  </text>
                  <text x="56" y="68" text-anchor="middle" font-family="DM Sans,sans-serif"
                    font-size="10" fill="#8BA3C7">match score</text>
                </svg>
                <div><span class="ai-badge-lg ${badgeClass}">${badgeLabel}</span></div>
              </div>
              <div class="ai-reason">${escHtml(job.aiPreviewReason || 'Analyzing your match…')}</div>
              <div class="ai-enriching" id="ai-enriching">
                ${I.spin} AI is enriching this analysis in the background…
              </div>
            </div>` : ''}

            <div id="similar-section"></div>
          </div>

          <!-- Right -->
          <div>
            <!-- Client -->
            <div class="side-card">
              <div class="side-card-title">${I.user} &nbsp;Posted by</div>
              <div style="display:flex;align-items:center;gap:0.85rem;">
                <div class="client-av">${clientInitial}</div>
                <div>
                  <div class="client-name">${escHtml(job.clientName || 'Client')}</div>
                  <div class="client-label">Client</div>
                </div>
              </div>
              <div class="competition-row">
                <div class="comp-header">
                  <span style="color:var(--text3);font-size:0.75rem;">Proposal activity</span>
                  <span style="color:${comp.color};font-size:0.75rem;font-weight:600;">${comp.label}</span>
                </div>
                <div class="comp-bar">
                  <div class="comp-fill" style="width:${comp.pct}%;background:${comp.color};"></div>
                </div>
              </div>
            </div>

            <!-- Summary -->
            <div class="side-card">
              <div class="side-card-title">${I.grid} &nbsp;Job Summary</div>
              <div class="detail-row">
                <span class="label">${I.dollar} Budget</span>
                <span class="value" style="color:var(--gold);font-family:'Syne',sans-serif;font-size:1.05rem;">
                  ${job.budget ? '$' + job.budget.toLocaleString() : 'Negotiable'}
                </span>
              </div>
              <div class="detail-row">
                <span class="label">${I.grid} Category</span>
                <span class="value">${job.category || '—'}</span>
              </div>
              <div class="detail-row">
                <span class="label">${I.cal} Posted</span>
                <span class="value">${formatDate(job.createdAt)}</span>
              </div>
              ${job.deadline ? `
              <div class="detail-row">
                <span class="label">${I.cal} Deadline</span>
                <span class="value">${formatDate(job.deadline)}</span>
              </div>` : ''}
              <div class="detail-row">
                <span class="label">${I.users} Proposals</span>
                <span class="value">${job.proposalCount || 0}</span>
              </div>
              <div class="detail-row">
                <span class="label">Status</span>
                <span class="value" style="color:var(--teal);">${job.status || 'OPEN'}</span>
              </div>
            </div>

            <!-- Apply -->
            <div class="apply-card" id="apply-section">
              <div class="apply-card-header">
                <div class="apply-icon">${I.arrow}</div>
                <h3>Apply for this Job</h3>
              </div>
              <div id="apply-form-content">
                <div class="form-group">
                  <label>${I.dollar2} Your Expected Rate ($/hr) *</label>
                  <div class="rate-wrap">
                    <span class="rate-curr">$</span>
                    <input type="number" id="expected-rate" class="form-control" placeholder="e.g. 45" min="1">
                  </div>
                </div>
                <div class="form-group">
                  <label>
                    ${I.letter} Cover Letter *
                    <span class="lbl-right">50–5000 chars</span>
                  </label>
                  <textarea id="cover-letter" class="form-control" rows="5"
                    placeholder="Introduce yourself and explain why you're a great fit for this role…"
                    oninput="updateCharCount()"></textarea>
                  <div class="char-count">
                    <span id="char-count">0</span>/5000
                    <span id="char-hint" style="margin-left:0.5rem;font-size:0.72rem;"></span>
                  </div>
                </div>
                <div class="form-group">
                  <label>
                    ${I.clip} Attachment
                    <span class="lbl-right">optional · max 5 MB</span>
                  </label>
                  <div class="upload-area" id="upload-area"
                    onclick="document.getElementById('attachment-input').click()"
                    ondragover="event.preventDefault();this.style.borderColor='var(--teal)'"
                    ondragleave="this.style.borderColor='var(--border2)'"
                    ondrop="handleDrop(event)">
                    ${I.upload}
                    Click to upload or drag &amp; drop<br>
                    <span style="font-size:0.75rem;margin-top:0.2rem;display:block;color:var(--text3);">PDF, JPG, PNG</span>
                  </div>
                  <input type="file" id="attachment-input" accept=".pdf,image/*"
                    style="display:none" onchange="handleFileSelect(this)">
                  <div id="file-preview" style="display:none;">
                    <div class="file-preview-row">
                      ${I.fileSm}
                      <span class="file-preview-name" id="file-name"></span>
                      <button class="remove-file-btn" onclick="removeFile()" title="Remove">${I.xMd}</button>
                    </div>
                  </div>
                  <div id="upload-status" style="font-size:0.78rem;margin-top:0.35rem;"></div>
                </div>
                <button class="apply-btn" id="apply-btn" onclick="submitProposal()">
                  Submit Proposal ${I.arrow}
                </button>
              </div>
            </div>
          </div>
        </div>`;

        setTimeout(() => {
            const el = document.getElementById('ai-enriching');
            if (el) el.style.display = 'none';
        }, 15000);
    }

    function updateCharCount() {
        const len  = document.getElementById('cover-letter').value.length;
        const ctr  = document.getElementById('char-count');
        const hint = document.getElementById('char-hint');
        ctr.textContent = len;
        if (len < 50) {
            ctr.style.color = 'var(--rose)';
            hint.textContent = `${50 - len} more needed`;
            hint.style.color = 'var(--rose)';
        } else if (len > 4800) {
            ctr.style.color = 'var(--gold)';
            hint.textContent = `${5000 - len} left`;
            hint.style.color = 'var(--gold)';
        } else {
            ctr.style.color = 'var(--text3)';
            hint.textContent = '';
        }
    }

    async function handleFileSelect(input) { const f = input.files[0]; if (f) await uploadFile(f); }
    function handleDrop(e) {
        e.preventDefault();
        document.getElementById('upload-area').style.borderColor = 'var(--border2)';
        const f = e.dataTransfer.files[0]; if (f) uploadFile(f);
    }

    async function uploadFile(file) {
        const allowed = ['application/pdf','image/jpeg','image/png','image/webp'];
        const status  = document.getElementById('upload-status');
        if (!allowed.includes(file.type)) { status.innerHTML = '<span style="color:var(--rose);">Only PDF, JPG, PNG allowed.</span>'; return; }
        if (file.size > 5 * 1024 * 1024)  { status.innerHTML = '<span style="color:var(--rose);">File must be under 5 MB.</span>'; return; }
        status.innerHTML = '<span style="color:var(--text3);">Uploading…</span>';
        const fd = new FormData(); fd.append('file', file);
        try {
            const res  = await fetch('/api/v1/proposals/attachment', {
                method:'POST', headers:{ Authorization:'Bearer ' + localStorage.getItem('sb_jwt') }, body:fd
            });
            const data = await res.json();
            if (res.ok) {
                uploadedFileUrl = data.url;
                document.getElementById('file-name').textContent = file.name;
                document.getElementById('file-preview').style.display = 'block';
                document.getElementById('upload-area').style.display  = 'none';
                status.innerHTML = '<span style="color:var(--teal);">Uploaded successfully.</span>';
            } else {
                status.innerHTML = `<span style="color:var(--rose);">${data.message || 'Upload failed.'}</span>`;
            }
        } catch(e) { status.innerHTML = '<span style="color:var(--rose);">Upload failed. Try again.</span>'; }
    }

    function removeFile() {
        uploadedFileUrl = null;
        document.getElementById('file-preview').style.display = 'none';
        document.getElementById('upload-area').style.display  = 'block';
        document.getElementById('upload-status').innerHTML    = '';
        document.getElementById('attachment-input').value     = '';
    }

    async function submitProposal() {
        const rate   = parseFloat(document.getElementById('expected-rate').value);
        const letter = document.getElementById('cover-letter').value.trim();
        if (!rate || rate <= 0) { showToast('Please enter your expected rate', true); return; }
        if (letter.length < 50)   { showToast('Cover letter must be at least 50 characters', true); return; }
        if (letter.length > 5000) { showToast('Cover letter cannot exceed 5000 characters', true); return; }

        const btn = document.getElementById('apply-btn');
        btn.disabled = true;
        btn.innerHTML = `${I.spin} Submitting…`;

        try {
            const res  = await api.post('/api/v1/proposals', {
                jobId: parseInt(jobId), expectedRate: rate,
                coverLetter: letter, attachmentUrl: uploadedFileUrl || null
            });
            const data = await res.json();

            if (res.ok) {
                const sc = data.aiMatchBadge === 'GREEN' ? 'var(--teal)' : data.aiMatchBadge === 'AMBER' ? 'var(--gold)' : 'var(--rose)';
                document.getElementById('apply-form-content').innerHTML = `
                    <div class="applied-msg">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--teal)" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="9 12 11 14 15 10"/></svg>
                        Proposal submitted!
                        <div style="font-weight:400;font-size:0.83rem;margin-top:0.5rem;color:var(--text2);">
                            AI Match Score: <strong style="color:${sc};">${data.aiMatchScore?.toFixed(0) || '—'}%</strong>
                            &nbsp;·&nbsp;
                            <span style="color:${sc};">${data.aiMatchBadge || ''}</span>
                        </div>
                    </div>`;
                showToast('Proposal submitted successfully!');
            } else if (res.status === 400 && data.message?.includes('already applied')) {
                document.getElementById('apply-form-content').innerHTML = `
                    <div class="applied-msg">
                        <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="var(--teal)" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="9 12 11 14 15 10"/></svg>
                        You have already applied to this job.
                    </div>`;
            } else {
                showToast('Error: ' + (data.message || 'Something went wrong'), true);
                btn.disabled = false;
                btn.innerHTML = `Submit Proposal ${I.arrow}`;
            }
        } catch(e) {
            showToast('Network error. Please try again.', true);
            btn.disabled = false;
            btn.innerHTML = `Submit Proposal ${I.arrow}`;
        }
    }

    async function loadSimilarJobs() {
        try {
            const res  = await api.get(`/api/v1/jobs/${jobId}/similar`);
            const jobs = await res.json();
            const section = document.getElementById('similar-section');
            if (!section || !jobs.length) return;
            section.innerHTML = `
                <div class="similar-heading">
                    ${I.search} <span style="color:var(--text);">Similar Jobs</span>
                </div>
                ${jobs.map(j => `
                    <a href="/job-detail.html?id=${j.id}" class="similar-card">
                        <div class="similar-title">${escHtml(j.title)}</div>
                        <div class="similar-meta">${j.category} &nbsp;·&nbsp; ${j.budget ? '$' + j.budget.toLocaleString() : 'Negotiable'}</div>
                    </a>`).join('')}`;
        } catch(e) { /* silent */ }
    }

    function showToast(msg, err = false) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.style.borderColor = err ? 'var(--rose)' : 'var(--teal)';
        t.style.color       = err ? 'var(--rose)' : 'var(--teal)';
        t.style.border      = `1px solid ${err ? 'var(--rose)' : 'var(--teal)'}`;
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3500);
    }

    loadJob();
</script>
</body>
</html>
