spring.datasource.url=jdbc:h2:mem:skillbridge_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.flyway.enabled=false

app.jwt.secret=test-secret-key-minimum-512-bits-long-for-hs512-algorithm-padded-here
app.jwt.expiration=86400000

app.ai.provider=ollama
app.ai.ollama.base-url=http://localhost:11434
app.ai.ollama.model=mistral:7b-instruct
app.ai.ollama.timeout-seconds=60

app.ai.openai.base-url=https://api.openai.com/v1
app.ai.openai.model=gpt-4o-mini
app.ai.openai.api-key=not-set

cloudinary.cloud-name=test-cloud
cloudinary.api-key=test-key
cloudinary.api-secret=test-secret

spring.mail.host=localhost
spring.mail.port=3025
spring.mail.username=test
spring.mail.password=test

app.base-url=http://localhost:8080
app.reset-token-expiry-minutes=30

spring.security.oauth2.client.registration.google.client-id=test-google-client-id
spring.security.oauth2.client.registration.google.client-secret=test-google-client-secret
spring.security.oauth2.client.registration.google.scope=email,profile

spring.security.oauth2.client.registration.github.client-id=test-github-client-id
spring.security.oauth2.client.registration.github.client-secret=test-github-client-secret
spring.security.oauth2.client.registration.github.scope=user:email,read:user

spring.config.import=

logging.level.root=WARN
logging.level.com.skillbridge=INFO